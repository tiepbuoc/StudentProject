
<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Quản trị</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fff9f0 0%, #ffe6d1 100%);
            height: 100vh;
            position: relative;
            color: var(--white);
            overflow: auto;
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {
            0%,100% { transform: translate(0,0); }
            10% { transform: translate(-2%,-3%); }
            20% { transform: translate(3%,2%); }
            30% { transform: translate(-1%,4%); }
            40% { transform: translate(4%,-1%); }
            50% { transform: translate(-3%,3%); }
            60% { transform: translate(2%,-4%); }
            70% { transform: translate(-4%,1%); }
            80% { transform: translate(1%,3%); }
            90% { transform: translate(3%,-2%); }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }
        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }
        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }
        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-30px) scale(1.05); }
        }

        .navbar {
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 100;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 1%;
            height: 72px;
            transition: all .3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 35px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .nav-links a.active {
            background: var(--jade);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--white);
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .nav-links a.active {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #fff;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .admin-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .admin-header i {
            font-size: 4em;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.5));
        }

        .admin-header h1 {
            color: var(--white);
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .admin-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .admin-tab {
            padding: 12px 30px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .admin-tab i {
            color: var(--jade);
        }

        .admin-tab:hover {
            background: var(--jade);
            border-color: var(--jade);
            color: white;
            transform: translateY(-2px);
        }

        .admin-tab.active {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: #fff;
            border: none;
            box-shadow: 0 5px 20px var(--jade-glow);
        }

        .admin-tab.active i {
            color: #fff;
        }

        .admin-content {
            display: none;
        }

        .admin-content.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .add-btn {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 60px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px var(--jade-glow);
        }

        .add-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.5);
        }

        .items-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .items-list::-webkit-scrollbar {
            width: 8px;
        }

        .items-list::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .items-list::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            border-radius: 10px;
        }

        .item-card {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s;
            animation: cardAppear 0.3s ease;
        }

        @keyframes cardAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .item-card:hover {
            border-width: 2px;
            border-color: var(--jade);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .item-title {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.2em;
            font-weight: bold;
        }

        .item-actions {
            display: flex;
            gap: 10px;
        }

        .item-btn {
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .item-btn.edit:hover {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border-color: #4CAF50;
            transform: rotate(15deg) scale(1.1);
        }

        .item-btn.delete:hover {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            border-color: #f44336;
            transform: rotate(15deg) scale(1.1);
        }

        .item-content {
            color: var(--text-mid);
        }

        .item-options {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
        }

        .item-option {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.95em;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .item-option.correct {
            border-left: 4px solid #4CAF50;
            background: rgba(76, 175, 80, 0.15);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
            }
            50% {
                box-shadow: 0 0 15px rgba(76, 175, 80, 0.5);
            }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8em;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 2em;
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            background: rgba(255, 69, 0, 0.3);
            color: #FF4500;
            transform: rotate(90deg);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 249, 240, 0.9);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--white);
            font-size: 1em;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--jade);
            box-shadow: 0 0 15px var(--jade-glow);
        }

        .options-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
        }

        .option-input {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 249, 240, 0.9);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }

        .option-input input[type="text"] {
            flex: 1;
            background: rgba(255, 249, 240, 0.9);
        }

        .option-input input[type="radio"] {
            width: auto;
            margin: 0;
            accent-color: #FFD700;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: #fff;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.5);
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }

            .admin-tabs {
                flex-direction: column;
            }

            .admin-tab {
                width: 100%;
                justify-content: center;
            }
        }

        .loading {
            text-align: center;
            color: white;
            padding: 20px;
        }

        .loading i {
            animation: spin 1s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

<body>
    <div class="grain"></div>
    <div class="ambient amb1"></div>
    <div class="ambient amb2"></div>
    <div class="ambient amb3"></div>

    <div class="navbar">
        <a class="logo" href="index.html">
            <img src="logo.png" alt="VIETVERSE Logo">
            <img src="markword.png" alt="VIETVERSE" style="height: 28px;">
        </a>
        <div class="nav-links">
            <a href="chatbot.html" title="Chatbot"><i class="fas fa-robot"></i></a>
            <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
            <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
            <a href="quantri.html" class="active" title="Quản trị"><i class="fas fa-cog"></i></a>
        </div>
        <div class="right-section">
            <div class="user-info" id="userInfo" style="display: none;">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Đang tải...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
            <button class="login-btn" id="loginBtn" style="display: none;" onclick="window.location.href='login.html'"><i class="fas fa-sign-in-alt"></i></button>
        </div>
    </div>

    <div class="container">
        <div class="admin-container">
            <div class="admin-header">
                <i class="fas fa-cog"></i>
                <h1>Quản trị hệ thống</h1>
            </div>

            <div class="admin-tabs">
                <button class="admin-tab active" onclick="switchTab('chatbot')">
                    <i class="fas fa-robot"></i> Câu hỏi Chatbot
                </button>
                <button class="admin-tab" onclick="switchTab('challenge')">
                    <i class="fas fa-trophy"></i> Câu hỏi Thử thách
                </button>
            </div>

            <div id="chatbot-tab" class="admin-content active">
                <button class="add-btn" onclick="openModal('chatbot')">
                    <i class="fas fa-plus"></i> Thêm câu hỏi gợi ý
                </button>
                <div class="items-list" id="chatbotQuestionsList"></div>
            </div>

            <div id="challenge-tab" class="admin-content">
                <button class="add-btn" onclick="openModal('challenge')">
                    <i class="fas fa-plus"></i> Thêm câu hỏi thử thách
                </button>
                <div class="items-list" id="challengeQuestionsList"></div>
            </div>
        </div>
    </div>

    <!-- Modal thêm/sửa câu hỏi -->
    <div class="modal" id="questionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Thêm câu hỏi</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="questionForm" onsubmit="saveQuestion(event)">
                <input type="hidden" id="questionId">
                <input type="hidden" id="questionType">

                <div class="form-group">
                    <label><i class="fas fa-question-circle"></i> Câu hỏi</label>
                    <textarea id="questionText" rows="3" required placeholder="Nhập câu hỏi..."></textarea>
                </div>

                <div class="options-group" id="optionsContainer">
                    <!-- Options sẽ được thêm bằng JavaScript -->
                </div>

                <button type="submit" class="save-btn">
                    <i class="fas fa-save"></i> Lưu câu hỏi
                </button>
            </form>
        </div>
    </div>

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let chatbotQuestions = [];
        let challengeQuestions = [];

        // Câu hỏi mặc định cho chatbot - Đã được cải thiện
        const defaultChatbotQuestions = [
            "Vua Hùng có công lao gì trong lịch sử dân tộc?",
            "Ý nghĩa của chiến thắng Bạch Đằng năm 938?",
            "Tìm hiểu về nguồn gốc và ý nghĩa của áo dài Việt Nam?",
            "Phong tục ngày Tết Nguyên Đán có từ bao giờ?",
            "Phở Hà Nội và phở Sài Gòn khác nhau như thế nào?",
            "Lịch sử xây dựng Văn Miếu - Quốc Tử Giám?",
            "Trần Hưng Đạo có vai trò gì trong lịch sử chống giặc ngoại xâm?",
            "Truyền thuyết bánh chưng, bánh giày kể về điều gì?",
            "Tầm quan trọng của chiến dịch Điện Biên Phủ?",
            "Ca trù - Di sản văn hóa phi vật thể của Việt Nam?",
            "Các quốc hiệu của Việt Nam qua các thời kỳ lịch sử?",
            "Chùa Hương có những nét đặc sắc gì về văn hóa tâm linh?",
            "Sự kiện Lý Thái Tổ dời đô về Thăng Long có ý nghĩa gì?",
            "Nghệ thuật múa rối nước độc đáo của người Việt?",
            "Trống đồng Đông Sơn - Biểu tượng văn hóa thời kỳ nào?",
            "Tết Trung Thu có ý nghĩa gì với trẻ em Việt Nam?",
            "Chiến thắng Rạch Gầm - Xoài Mút do ai lãnh đạo?",
            "Nón lá Việt Nam có từ bao giờ và ý nghĩa ra sao?",
            "Chiến công hiển hách của vua Quang Trung đại phá quân Thanh?",
            "Làng gốm Bát Tràng nổi tiếng với những sản phẩm gì?"
        ];

        // Câu hỏi mặc định cho thử thách - Đã được cải thiện
        const defaultChallengeQuestions = [
            {
                question: "Vị vua nào được coi là người sáng lập ra nhà nước Văn Lang?",
                options: ["Kinh Dương Vương", "Lạc Long Quân", "Hùng Vương thứ I", "An Dương Vương"],
                correct: 2
            },
            {
                question: "Trận địa cọc gỗ trên sông Bạch Đằng năm 938 do ai chỉ huy?",
                options: ["Ngô Quyền", "Dương Đình Nghệ", "Kiều Công Tiễn", "Lý Thường Kiệt"],
                correct: 0
            },
            {
                question: "Chiếc áo dài truyền thống Việt Nam bắt nguồn từ triều đại nào?",
                options: ["Lý", "Trần", "Lê", "Nguyễn"],
                correct: 3
            },
            {
                question: "Tết Nguyên Đán còn có tên gọi dân gian nào khác?",
                options: ["Tết Cả", "Tết Trung Thu", "Tết Đoan Ngọ", "Tết Hàn Thực"],
                correct: 0
            },
            {
                question: "Văn Miếu - Quốc Tử Giám được xây dựng dưới triều vua nào?",
                options: ["Lý Thái Tổ", "Lý Thánh Tông", "Lý Nhân Tông", "Lý Anh Tông"],
                correct: 1
            },
            {
                question: "Trần Hưng Đạo đã chỉ huy quân dân nhà Trần đánh thắng quân Nguyên Mông mấy lần?",
                options: ["1 lần", "2 lần", "3 lần", "4 lần"],
                correct: 1
            },
            {
                question: "Truyền thuyết bánh chưng, bánh giày gắn với đời vua Hùng thứ mấy?",
                options: ["Hùng Vương thứ 6", "Hùng Vương thứ 7", "Hùng Vương thứ 8", "Hùng Vương thứ 18"],
                correct: 0
            },
            {
                question: "Chiến dịch Điện Biên Phủ kết thúc vào ngày tháng năm nào?",
                options: ["7/5/1954", "5/7/1954", "7/5/1953", "5/7/1953"],
                correct: 0
            },
            {
                question: "Ca trù còn được gọi là gì?",
                options: ["Hát ả đào", "Hát chèo", "Hát tuồng", "Hát xẩm"],
                correct: 0
            },
            {
                question: "Quốc hiệu Đại Việt có từ năm nào?",
                options: ["1010", "1054", "1070", "1225"],
                correct: 1
            }
        ];

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            // Kiểm tra email admin
            if (!user.email.endsWith('@admin.com')) {
                alert('Bạn không có quyền truy cập trang này!');
                window.location.href = 'index.html';
                return;
            }

            if (document.getElementById('userName')) {
                const displayName = user.displayName || 'Admin';
                document.getElementById('userName').textContent = displayName;
            }
            currentUser = user;

            await loadQuestions();
        });

        async function loadQuestions() {
            try {
                // Load câu hỏi chatbot
                const chatbotDoc = await db.collection('settings').doc('chatbotQuestions').get();
                if (chatbotDoc.exists) {
                    chatbotQuestions = chatbotDoc.data().questions || [];
                } else {
                    // Tạo dữ liệu mặc định
                    chatbotQuestions = defaultChatbotQuestions;
                    await db.collection('settings').doc('chatbotQuestions').set({
                        questions: defaultChatbotQuestions
                    });
                }

                // Load câu hỏi thử thách
                const challengeDoc = await db.collection('settings').doc('challengeQuestions').get();
                if (challengeDoc.exists) {
                    challengeQuestions = challengeDoc.data().questions || [];
                } else {
                    // Tạo dữ liệu mặc định
                    challengeQuestions = defaultChallengeQuestions;
                    await db.collection('settings').doc('challengeQuestions').set({
                        questions: defaultChallengeQuestions
                    });
                }

                displayChatbotQuestions();
                displayChallengeQuestions();
            } catch (error) {
                console.error('Lỗi khi load câu hỏi:', error);
                showLoading(false);
            }
        }

        function displayChatbotQuestions() {
            const list = document.getElementById('chatbotQuestionsList');
            if (!chatbotQuestions || chatbotQuestions.length === 0) {
                list.innerHTML = '<div class="loading"><i class="fas fa-info-circle"></i> Chưa có câu hỏi nào</div>';
                return;
            }
            list.innerHTML = chatbotQuestions.map((q, index) => `
                <div class="item-card">
                    <div class="item-header">
                        <span class="item-title"><i class="fas fa-question-circle"></i> Câu hỏi ${index + 1}</span>
                        <div class="item-actions">
                            <button class="item-btn edit" onclick="editChatbotQuestion(${index})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="item-btn delete" onclick="deleteChatbotQuestion(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="item-content">${q}</div>
                </div>
            `).join('');
        }

        function displayChallengeQuestions() {
            const list = document.getElementById('challengeQuestionsList');
            if (!challengeQuestions || challengeQuestions.length === 0) {
                list.innerHTML = '<div class="loading"><i class="fas fa-info-circle"></i> Chưa có câu hỏi nào</div>';
                return;
            }
            list.innerHTML = challengeQuestions.map((q, index) => `
                <div class="item-card">
                    <div class="item-header">
                        <span class="item-title"><i class="fas fa-question-circle"></i> Câu hỏi ${index + 1}</span>
                        <div class="item-actions">
                            <button class="item-btn edit" onclick="editChallengeQuestion(${index})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="item-btn delete" onclick="deleteChallengeQuestion(${index})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="item-content">
                        <p><strong>${q.question}</strong></p>
                        <div class="item-options">
                            ${q.options.map((opt, optIndex) => `
                                <div class="item-option ${optIndex === q.correct ? 'correct' : ''}">
                                    ${String.fromCharCode(65 + optIndex)}. ${opt}
                                    ${optIndex === q.correct ? ' <i class="fas fa-check" style="color: #4caf50;"></i>' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.admin-tab');
            const contents = document.querySelectorAll('.admin-content');

            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));

            if (tab === 'chatbot') {
                tabs[0].classList.add('active');
                document.getElementById('chatbot-tab').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('challenge-tab').classList.add('active');
            }
        }

        function openModal(type) {
            document.getElementById('questionType').value = type;
            document.getElementById('modalTitle').textContent = type === 'chatbot' ? 'Thêm câu hỏi gợi ý' : 'Thêm câu hỏi thử thách';
            document.getElementById('questionId').value = '';
            document.getElementById('questionText').value = '';

            if (type === 'challenge') {
                document.getElementById('optionsContainer').innerHTML = `
                    <label>Đáp án (chọn đáp án đúng)</label>
                    ${[0, 1, 2, 3].map(i => `
                        <div class="option-input">
                            <input type="radio" name="correctOption" value="${i}" ${i === 0 ? 'checked' : ''}>
                            <input type="text" id="option${i}" placeholder="Đáp án ${String.fromCharCode(65 + i)}" required>
                        </div>
                    `).join('')}
                `;
            } else {
                document.getElementById('optionsContainer').innerHTML = '';
            }

            document.getElementById('questionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('questionModal').classList.remove('active');
        }

        function editChatbotQuestion(index) {
            const question = chatbotQuestions[index];
            document.getElementById('questionType').value = 'chatbot';
            document.getElementById('modalTitle').textContent = 'Sửa câu hỏi gợi ý';
            document.getElementById('questionId').value = index;
            document.getElementById('questionText').value = question;
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('questionModal').classList.add('active');
        }

        function editChallengeQuestion(index) {
            const question = challengeQuestions[index];
            document.getElementById('questionType').value = 'challenge';
            document.getElementById('modalTitle').textContent = 'Sửa câu hỏi thử thách';
            document.getElementById('questionId').value = index;
            document.getElementById('questionText').value = question.question;

            let optionsHtml = '<label>Đáp án (chọn đáp án đúng)</label>';
            for (let i = 0; i < 4; i++) {
                optionsHtml += `
                    <div class="option-input">
                        <input type="radio" name="correctOption" value="${i}" ${i === question.correct ? 'checked' : ''}>
                        <input type="text" id="option${i}" value="${question.options[i] || ''}" placeholder="Đáp án ${String.fromCharCode(65 + i)}" required>
                    </div>
                `;
            }
            document.getElementById('optionsContainer').innerHTML = optionsHtml;

            document.getElementById('questionModal').classList.add('active');
        }

        async function saveQuestion(event) {
            event.preventDefault();

            const type = document.getElementById('questionType').value;
            const id = document.getElementById('questionId').value;
            const questionText = document.getElementById('questionText').value.trim();

            if (!questionText) {
                alert('Vui lòng nhập câu hỏi');
                return;
            }

            if (type === 'chatbot') {
                if (id === '') {
                    // Thêm mới
                    chatbotQuestions.push(questionText);
                } else {
                    // Sửa
                    chatbotQuestions[parseInt(id)] = questionText;
                }

                await db.collection('settings').doc('chatbotQuestions').set({
                    questions: chatbotQuestions
                });

                displayChatbotQuestions();
            } else {
                // Lấy các đáp án
                const options = [];
                for (let i = 0; i < 4; i++) {
                    const opt = document.getElementById(`option${i}`).value.trim();
                    if (!opt) {
                        alert(`Vui lòng nhập đáp án ${String.fromCharCode(65 + i)}`);
                        return;
                    }
                    options.push(opt);
                }

                const correctOption = parseInt(document.querySelector('input[name="correctOption"]:checked').value);

                const questionData = {
                    question: questionText,
                    options: options,
                    correct: correctOption
                };

                if (id === '') {
                    // Thêm mới
                    challengeQuestions.push(questionData);
                } else {
                    // Sửa
                    challengeQuestions[parseInt(id)] = questionData;
                }

                await db.collection('settings').doc('challengeQuestions').set({
                    questions: challengeQuestions
                });

                displayChallengeQuestions();
            }

            closeModal();
        }

        async function deleteChatbotQuestion(index) {
            if (confirm('Bạn có chắc muốn xóa câu hỏi này?')) {
                chatbotQuestions.splice(index, 1);
                await db.collection('settings').doc('chatbotQuestions').set({
                    questions: chatbotQuestions
                });
                displayChatbotQuestions();
            }
        }

        async function deleteChallengeQuestion(index) {
            if (confirm('Bạn có chắc muốn xóa câu hỏi này?')) {
                challengeQuestions.splice(index, 1);
                await db.collection('settings').doc('challengeQuestions').set({
                    questions: challengeQuestions
                });
                displayChallengeQuestions();
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }
    </script>
</body>

</html>
