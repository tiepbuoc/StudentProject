<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Khám phá văn hóa Việt Nam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 45px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .logo span {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links a:hover {
            background: #ffd700;
            color: #370100;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .nav-links a.active {
            background: #ffd700;
            color: #370100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info i {
            color: #ffd700;
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .welcome-section {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .welcome-section h1 {
            color: #ffd700;
            font-size: 2.8em;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .welcome-section p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.2em;
            line-height: 1.6;
            max-width: 800px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 35px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            animation: fadeInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }

        .stat-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 215, 0, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .stat-icon {
            font-size: 3em;
            color: #ffd700;
            margin-bottom: 20px;
        }

        .stat-number {
            font-size: 2.8em;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
            letter-spacing: 1px;
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .feature-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            text-align: center;
            animation: fadeInUp 0.5s ease;
            animation-fill-mode: both;
        }

        .feature-card:nth-child(1) { animation-delay: 0.1s; }
        .feature-card:nth-child(2) { animation-delay: 0.2s; }
        .feature-card:nth-child(3) { animation-delay: 0.3s; }

        .feature-card:hover {
            transform: translateY(-15px);
            border-color: #ffd700;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5);
        }

        .feature-icon {
            font-size: 4em;
            color: #ffd700;
            margin-bottom: 25px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .feature-title {
            font-size: 1.8em;
            color: white;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .feature-description {
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            font-size: 1.1em;
        }

        .feedback-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            margin-top: 30px;
            animation: fadeInUp 0.5s ease 0.4s both;
        }

        .feedback-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .feedback-header i {
            font-size: 2em;
            color: #ffd700;
        }

        .feedback-header h3 {
            color: white;
            font-size: 1.5em;
        }

        .feedback-content {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1em;
            line-height: 1.6;
            padding: 20px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            border-left: 4px solid #ffd700;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
            }
            
            .welcome-section h1 {
                font-size: 2em;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="VIETVERSE Logo">
            <span>VIETVERSE</span>
        </div>
        <div class="nav-links">
            <a href="index.html" class="active" title="Trang chủ"><i class="fas fa-home"></i></a>
            <a href="chatbot.html" title="Chatbot"><i class="fas fa-robot"></i></a>
            <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
            <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
        </div>
        <div class="user-info" id="userInfo">
            <i class="fas fa-user-circle"></i>
            <span id="userName">Đang tải...</span>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
        </div>
    </div>

    <div class="container" id="mainContent">
        <!-- Nội dung sẽ được load bằng JavaScript -->
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Kiểm tra trạng thái đăng nhập
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('userName').textContent = user.displayName || 'Người dùng';
                loadHomePage(user);
            }
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        async function loadHomePage(user) {
            try {
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.exists ? userDoc.data() : {};
                const challengeHistory = userData.challengeHistory || [];
                
                let statsHtml = '';
                let feedbackHtml = '';

                if (challengeHistory.length > 0) {
                    const totalScore = challengeHistory.reduce((sum, c) => sum + (c.score || 0), 0);
                    const avgPercentage = Math.round(challengeHistory.reduce((sum, c) => sum + (c.percentage || 0), 0) / challengeHistory.length);
                    const lastChallenge = challengeHistory[challengeHistory.length - 1];

                    statsHtml = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-star"></i></div>
                                <div class="stat-number">${totalScore}</div>
                                <div class="stat-label">Tổng điểm</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-history"></i></div>
                                <div class="stat-number">${challengeHistory.length}</div>
                                <div class="stat-label">Số lần thử thách</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-percent"></i></div>
                                <div class="stat-number">${avgPercentage}%</div>
                                <div class="stat-label">Tỷ lệ trung bình</div>
                            </div>
                        </div>
                    `;

                    if (lastChallenge.aiFeedback) {
                        feedbackHtml = `
                            <div class="feedback-card">
                                <div class="feedback-header">
                                    <i class="fas fa-robot"></i>
                                    <h3>Nhận xét từ thử thách gần nhất</h3>
                                </div>
                                <div class="feedback-content">
                                    ${lastChallenge.aiFeedback}
                                </div>
                            </div>
                        `;
                    }
                }

                document.getElementById('mainContent').innerHTML = `
                    <div class="welcome-section">
                        <h1>Chào mừng ${user.displayName || 'bạn'} trở lại VIETVERSE!</h1>
                        <p>Khám phá vẻ đẹp văn hóa và lịch sử Việt Nam qua những trải nghiệm tương tác độc đáo. Hãy tiếp tục hành trình khám phá của bạn!</p>
                    </div>

                    ${statsHtml}

                    <div class="features-grid">
                        <a href="chatbot.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-robot"></i></div>
                            <div class="feature-title">Chatbot Sao Vàng</div>
                            <div class="feature-description">Trò chuyện với AI về lịch sử và văn hóa Việt Nam</div>
                        </a>

                        <a href="thuthach.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-trophy"></i></div>
                            <div class="feature-title">Thử thách kiến thức</div>
                            <div class="feature-description">Kiểm tra hiểu biết và nhận đánh giá chi tiết từ AI</div>
                        </a>

                        <a href="minigame.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-gamepad"></i></div>
                            <div class="feature-title">Minigame</div>
                            <div class="feature-description">Giải trí với các trò chơi nhỏ về văn hóa Việt Nam</div>
                        </a>
                    </div>

                    ${feedbackHtml}
                `;
            } catch (error) {
                console.error('Lỗi khi load trang chủ:', error);
            }
        }
    </script>
</body>
</html>
