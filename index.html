<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sao Vàng - Lịch sử & Văn hóa Việt Nam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header-placeholder {
            height: 75px;
            width: 100%;
            background: transparent;
            flex-shrink: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .user-message {
            background: rgba(139, 69, 19, 0.75);
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 5px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.75);
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(218, 165, 32, 0.5);
        }

        .bot-message strong {
            color: #8b4513;
        }

        .typing-indicator {
            display: flex;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 18px;
            max-width: 100px;
            margin-bottom: 15px;
            border: 1px solid rgba(218, 165, 32, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8b4513;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 15px 20px;
            background: transparent;
            border-top: none;
            display: flex;
            gap: 15px;
            backdrop-filter: none;
            flex-shrink: 0;
            width: 100%;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        #user-input {
            flex: 1;
            /* KHÔNG có border, KHÔNG có border-radius */
            border: none;
            outline: none;
            font-size: 16px;
            transition: background 0.3s;
            background-image: url('ta-bg.png');
            background-size: 100% 100%; /* Kéo giãn ảnh khung nhập theo đúng kích thước */
            background-repeat: no-repeat;
            background-position: center;
            color: white;
            font-weight: 500;
            height: 0;
            min-height: 40px;
            /* Padding chỉ để tạo khoảng cách cho chữ, không ảnh hưởng đến khung */
            padding: 0 25px; /* Tăng padding ngang để chữ không sát mép */
            background-color: transparent;
            /* Đảm bảo không có hiệu ứng focus mặc định */
            -webkit-appearance: none;
            appearance: none;
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
        }

        /* Xóa hoàn toàn mọi border khi focus */
        #user-input:focus {
            border: none;
            outline: none;
            box-shadow: none;
            background-color: transparent;
        }

        #send-button {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 1;
            border-radius: 0;
            background-image: url('send-nm.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 0;
            height: 0;
            aspect-ratio: 1/1;
            min-width: 40px;
            min-height: 40px;
        }

        #send-button:hover {
            opacity: 0.7;
            background-image: url('send-m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .clear-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 10;
        }

        .clear-btn:hover {
            background: #ffd700;
            color: #8b4513;
        }

        .error-message {
            color: #d32f2f;
            background: rgba(255, 205, 210, 0.9);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header-placeholder"></div>
        
        <button class="clear-btn" onclick="clearHistory()">Xóa lịch sử</button>

        <div id="messages" class="messages-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi tôi về lịch sử và văn hóa Việt Nam..."
                    autocomplete="off">
                <button id="send-button" onclick="sendMessage()"></button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyA9wqELJsr2sfgOK3wZKZ9macWz6bQIOxw';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`;

        let currentContext = 'none';
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const inputWrapper = document.querySelector('.input-wrapper');

        // Hàm tính toán kích thước theo tỷ lệ 20:1
        function resizeInputArea() {
            if (!inputWrapper || !userInput || !sendButton) return;
            
            const wrapperWidth = inputWrapper.offsetWidth;
            const gap = 15;
            
            let totalWidth = wrapperWidth - gap;
            let height = Math.max(40, Math.round(totalWidth / 20));
            
            userInput.style.height = height + 'px';
            userInput.style.lineHeight = height + 'px';
            
            sendButton.style.width = height + 'px';
            sendButton.style.height = height + 'px';
        }

        function loadChatHistory() {
            const savedMessages = localStorage.getItem('saoVangChatHistory');
            const savedContext = localStorage.getItem('saoVangContext');

            if (savedMessages) {
                messagesContainer.innerHTML = savedMessages;
            }

            if (savedContext) {
                currentContext = savedContext;
            }

            scrollToBottom();
        }

        function saveChatHistory() {
            localStorage.setItem('saoVangChatHistory', messagesContainer.innerHTML);
            localStorage.setItem('saoVangContext', currentContext);
        }

        function clearHistory() {
            if (confirm('Bạn có chắc muốn xóa toàn bộ lịch sử trò chuyện?')) {
                messagesContainer.innerHTML = '';
                currentContext = 'none';
                localStorage.removeItem('saoVangChatHistory');
                localStorage.removeItem('saoVangContext');
                addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?');
            }
        }

        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                messageDiv.innerHTML = `<strong>Sao Vàng:</strong><br>${content}`;
            } else {
                messageDiv.textContent = content;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            saveChatHistory();
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.textContent = message;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function callGeminiAPI(userMessage) {
            let prompt = `Bạn là Sao Vàng - chuyên gia về lịch sử và văn hóa Việt Nam. 
            Bối cảnh cuộc trò chuyện hiện tại: ${currentContext}
            
            Yêu cầu của người dùng: ${userMessage}
            
            Một số lưu ý trong lúc trả lời:
            - Phần câu trả lời (answer) không được quá dài tầm dưới 50 từ thôi

            Hãy phản hồi dưới định dạng JSON với 2 phần:
            1. "answer": Câu trả lời chi tiết, chính xác, dựa trên yêu cầu của người dùng và bối cảnh cuộc trò chuyện.
            2. "newContext": Tổng kết bối cảnh mới của cuộc trò chuyện (tóm tắt dựa trên bối cảnh cũ, yêu cầu mới và câu trả lời, chỉ giữ thông tin quan trọng nhất cho các câu hỏi tiếp theo).
            
            Ví dụ format:
            {
                "answer": "Câu trả lời của bạn...",
                "newContext": "Tóm tắt bối cảnh mới..."
            }`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }]
                })
            });

            if (!response.ok) {
                throw new Error('Lỗi kết nối đến Gemini API');
            }

            const data = await response.json();
            const textResponse = data.candidates[0].content.parts[0].text;

            const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
            if (!jsonMatch) {
                throw new Error('Không thể parse JSON từ response');
            }

            return JSON.parse(jsonMatch[0]);
        }

        async function sendMessage() {
            const message = userInput.value.trim();

            if (!message) return;

            if (API_KEY === 'YOUR_GEMINI_API_KEY') {
                showError('Vui lòng cấu hình Gemini API key trong mã nguồn!');
                return;
            }

            addMessage('user', message);
            userInput.value = '';

            userInput.disabled = true;
            sendButton.disabled = true;

            showTypingIndicator();

            try {
                const response = await callGeminiAPI(message);

                removeTypingIndicator();

                addMessage('bot', response.answer);

                currentContext = response.newContext;
                saveChatHistory();

            } catch (error) {
                removeTypingIndicator();
                showError('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại sau.');
                console.error('Error:', error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        window.addEventListener('resize', () => {
            resizeInputArea();
        });

        window.addEventListener('load', () => {
            loadChatHistory();
            if (messagesContainer.children.length === 0) {
                addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?');
            }
            setTimeout(resizeInputArea, 100);
        });

        const resizeObserver = new ResizeObserver(() => {
            resizeInputArea();
        });
        
        if (inputWrapper) {
            resizeObserver.observe(inputWrapper);
        }
    </script>
</body>
</html>
