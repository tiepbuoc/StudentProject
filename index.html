<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIETVERSE - Khám phá văn hóa Việt Nam</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink: #fff9f0;
      --ink2: #ffefe0;
      --ink3: #ffe6d1;
      --jade: #ff8c42;
      --jade2: #ff6b2b;
      --jade-glow: rgba(255, 140, 66, 0.18);
      --jade-pale: rgba(255, 140, 66, 0.08);
      --gold: #ffb347;
      --gold-pale: rgba(255, 179, 71, 0.12);
      --white: #2c1810;
      --fog: rgba(44, 24, 16, 0.55);
      --mist: rgba(44, 24, 16, 0.08);
      --border: rgba(255, 140, 66, 0.18);
      --text-dim: rgba(44, 24, 16, 0.65);
      --text-mid: rgba(44, 24, 16, 0.72);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #fff9f0 0%, #ffe6d1 100%);
      min-height: 100vh;
      position: relative;
      color: var(--white);
    }

    /* Grain effect */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      opacity: .035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
      animation: grainAnim 8s steps(10) infinite;
    }

    @keyframes grainAnim {

      0%,
      100% {
        transform: translate(0, 0);
      }

      10% {
        transform: translate(-2%, -3%);
      }

      20% {
        transform: translate(3%, 2%);
      }

      30% {
        transform: translate(-1%, 4%);
      }

      40% {
        transform: translate(4%, -1%);
      }

      50% {
        transform: translate(-3%, 3%);
      }

      60% {
        transform: translate(2%, -4%);
      }

      70% {
        transform: translate(-4%, 1%);
      }

      80% {
        transform: translate(1%, 3%);
      }

      90% {
        transform: translate(3%, -2%);
      }
    }

    /* Ambient lights */
    .ambient {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(120px);
      z-index: 0;
    }

    .amb1 {
      top: -200px;
      right: -100px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
      animation: ambFloat 12s ease-in-out infinite;
    }

    .amb2 {
      bottom: -200px;
      left: -150px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
      animation: ambFloat 16s ease-in-out infinite reverse;
    }

    .amb3 {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 800px;
      height: 400px;
      background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
    }

    @keyframes ambFloat {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(30px, -30px) scale(1.05);
      }
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      padding: 0 1%;
      height: 72px;
      background: rgba(255, 249, 240, 0.8);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      border-bottom: 1px solid var(--border);
      transition: all .3s;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
    }

    .logo img {
      height: 38px;
      width: auto;
      filter: drop-shadow(0 4px 6px var(--jade-glow));
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .right-section {
      display: flex;
      align-items: center;
    }

    .nav-links a {
      color: var(--white);
      text-decoration: none;
      font-size: 16px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.3s;
      background: var(--jade-pale);
      border: 1px solid var(--border);
    }

    .nav-links a:hover {
      background: var(--jade);
      color: white;
      transform: translateY(-3px);
      box-shadow: 0 10px 20px var(--jade-glow);
    }

    .nav-links a.active {
      background: var(--jade);
      color: white;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 15px;
      color: var(--white);
      background: var(--jade-pale);
      padding: 8px 20px;
      border-radius: 50px;
      border: 1px solid var(--border);
    }

    .user-info i {
      color: var(--jade);
      font-size: 18px;
    }

    .user-info span {
      font-weight: 500;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .logout-btn:hover {
      background: var(--jade-pale);
      border-color: var(--jade);
      color: var(--jade);
    }

    .login-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--white);
      padding: 6px 15px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .login-btn:hover {
      background: var(--jade-pale);
      border-color: var(--jade);
      color: var(--jade);
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 100px auto 40px;
      padding: 0 20px;
    }

    .welcome-section {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 30px;
      padding: 50px;
      margin-bottom: 40px;
      border: 1px solid var(--border);
      box-shadow: 0 20px 40px var(--jade-glow);
      animation: fadeInUp 0.5s ease;
      position: relative;
      overflow: hidden;
    }

    .welcome-section::before {
      content: '';
      position: absolute;
      top: -100px;
      right: -100px;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .welcome-section h1 {
      color: var(--jade2);
      font-size: 2.8em;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px var(--jade-pale);
      font-family: 'Fraunces', serif;
    }

    .welcome-section p {
      color: var(--text-mid);
      font-size: 1.2em;
      line-height: 1.6;
      max-width: 800px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 25px;
      margin-bottom: 50px;
    }

    .stat-card {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 35px;
      text-align: center;
      border: 1px solid var(--border);
      transition: all 0.3s;
      animation: fadeInUp 0.5s ease;
      animation-fill-mode: both;
      box-shadow: 0 10px 30px var(--jade-glow);
    }

    .stat-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .stat-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .stat-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-10px);
      border-color: var(--jade);
      box-shadow: 0 20px 40px var(--jade-glow);
    }

    .stat-icon {
      font-size: 3em;
      color: var(--jade);
      margin-bottom: 20px;
    }

    .stat-number {
      font-size: 2.8em;
      font-weight: bold;
      color: var(--jade2);
      margin-bottom: 10px;
      text-shadow: 0 0 20px var(--jade-glow);
    }

    .stat-label {
      color: var(--text-mid);
      font-size: 1.1em;
      letter-spacing: 1px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }

    .feature-card {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 40px 30px;
      border: 1px solid var(--border);
      transition: all 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      text-align: center;
      animation: fadeInUp 0.5s ease;
      animation-fill-mode: both;
      box-shadow: 0 10px 30px var(--jade-glow);
      position: relative;
      overflow: hidden;
    }

    .feature-card::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -50px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
      border-radius: 50%;
      transition: all 0.5s;
    }

    .feature-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .feature-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .feature-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .feature-card:hover {
      transform: translateY(-15px);
      border-color: var(--jade);
      box-shadow: 0 30px 50px var(--jade-glow);
    }

    .feature-card:hover::before {
      width: 250px;
      height: 250px;
      opacity: 1.5;
    }

    .feature-icon {
      font-size: 4em;
      color: var(--jade);
      margin-bottom: 25px;
      text-shadow: 0 0 30px var(--jade-glow);
    }

    .feature-title {
      font-size: 1.8em;
      color: var(--jade2);
      margin-bottom: 15px;
      font-weight: bold;
      font-family: 'Fraunces', serif;
    }

    .feature-description {
      color: var(--text-mid);
      line-height: 1.6;
      font-size: 1.1em;
    }

    .feedback-card {
      background: rgba(255, 249, 240, 0.9);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-radius: 25px;
      padding: 30px;
      border: 1px solid var(--jade);
      margin-top: 30px;
      animation: fadeInUp 0.5s ease 0.4s both;
      box-shadow: 0 10px 30px var(--jade-glow);
    }

    .feedback-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .feedback-header i {
      font-size: 2em;
      color: var(--jade);
    }

    .feedback-header h3 {
      color: var(--jade2);
      font-size: 1.5em;
      font-family: 'Fraunces', serif;
    }

    .feedback-content {
      color: var(--text-mid);
      font-size: 1.1em;
      line-height: 1.6;
      padding: 20px;
      background: var(--jade-pale);
      border-radius: 15px;
      border-left: 4px solid var(--jade);
    }

    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        height: auto;
        padding: 15px;
      }

      .welcome-section h1 {
        font-size: 2em;
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .container {
        margin-top: 150px;
      }
    }

    @media (max-width: 480px) {
      .welcome-section {
        padding: 30px;
      }

      .welcome-section h1 {
        font-size: 1.8em;
      }

      .feature-title {
        font-size: 1.5em;
      }
    }
  </style>
</head>

<body>
  <div class="grain"></div>
  <div class="ambient amb1"></div>
  <div class="ambient amb2"></div>
  <div class="ambient amb3"></div>

  <div class="navbar">
    <a class="logo" href="index.html">
      <img src="logo.png" alt="VIETVERSE Logo">
      <img src="markword.png" alt="VIETVERSE" style="height: 28px;">
    </a>
    <div class="nav-links">
      <a href="chatbot.html" title="Chatbot"><i class="fas fa-robot"></i></a>
      <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
      <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
      <a href="quantri.html" id="adminLink" style="display: none;" title="Quản trị"><i class="fas fa-cog"></i></a>
    </div>
    <div class="right-section">
      <div class="user-info" id="userInfo" style="display: none;">
        <i class="fas fa-user-circle"></i>
        <span id="userName">Đang tải...</span>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
      </div>
      <button class="login-btn" id="loginBtn" style="display: none;" onclick="window.location.href='login.html'"><i
          class="fas fa-sign-in-alt"></i></button>
    </div>
  </div>

  <div class="container" id="mainContent">
    <!-- Nội dung sẽ được load bằng JavaScript -->
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
      authDomain: "kehoachso.firebaseapp.com",
      projectId: "kehoachso",
      storageBucket: "kehoachso.firebasestorage.app",
      messagingSenderId: "80210804205",
      appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
      measurementId: "G-C6YGPPG13R"
    };

    // Khởi tạo Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Kiểm tra trạng thái đăng nhập
    auth.onAuthStateChanged((user) => {
      if (user) {
        if (document.getElementById('userInfo')) document.getElementById('userInfo').style.display = 'flex';
        if (document.getElementById('loginBtn')) document.getElementById('loginBtn').style.display = 'none';
        if (document.getElementById('loginLink')) document.getElementById('loginLink').style.display = 'none';
        if (document.getElementById('userName')) {
          const displayName = user.displayName || 'Người dùng';
          document.getElementById('userName').textContent = displayName;
        }

        // Kiểm tra email admin
        const adminLink = document.getElementById('adminLink');
        if (adminLink) {
          if (user.email && user.email.endsWith('@admin.com')) {
            adminLink.style.display = 'flex';
          } else {
            adminLink.style.display = 'none';
          }
        }

        loadHomePage(user);
      } else {
        window.location.href = 'login.html';
      }
    });

    function logout() {
      auth.signOut().then(() => {
        window.location.href = 'login.html';
      });
    }

    function loadGuestHomePage() {
      document.getElementById('mainContent').innerHTML = `
                <div class="welcome-section">
                    <h1>Chào mừng đến với VIETVERSE!</h1>
                    <p>Khám phá vẻ đẹp văn hóa và lịch sử Việt Nam qua những trải nghiệm tương tác độc đáo. Đăng nhập để lưu lại tiến trình và nhận đánh giá từ AI!</p>
                </div>

                <div class="features-grid">
                    <a href="chatbot.html" class="feature-card">
                        <div class="feature-icon"><i class="fas fa-robot"></i></div>
                        <div class="feature-title">Chatbot Sao Vàng</div>
                        <div class="feature-description">Trò chuyện với AI về lịch sử và văn hóa Việt Nam</div>
                    </a>

                    <a href="thuthach.html" class="feature-card">
                        <div class="feature-icon"><i class="fas fa-trophy"></i></div>
                        <div class="feature-title">Thử thách kiến thức</div>
                        <div class="feature-description">Kiểm tra hiểu biết và nhận đánh giá chi tiết từ AI</div>
                    </a>

                    <a href="minigame.html" class="feature-card">
                        <div class="feature-icon"><i class="fas fa-gamepad"></i></div>
                        <div class="feature-title">Minigame</div>
                        <div class="feature-description">Giải trí với các trò chơi nhỏ về văn hóa Việt Nam</div>
                    </a>
                </div>

                <div class="feedback-card">
                    <div class="feedback-header">
                        <i class="fas fa-info-circle"></i>
                        <h3>Về VIETVERSE</h3>
                    </div>
                    <div class="feedback-content">
                        VIETVERSE là nền tảng khám phá văn hóa và lịch sử Việt Nam thông qua AI. 
                        Đăng nhập để trải nghiệm đầy đủ: lưu lịch sử chat, tham gia thử thách, 
                        nhận đánh giá chi tiết và theo dõi tiến trình học tập của bạn!
                    </div>
                </div>
            `;
    }

    async function loadHomePage(user) {
      try {
        const userDoc = await db.collection('users').doc(user.uid).get();
        const userData = userDoc.exists ? userDoc.data() : {};
        const challengeHistory = userData.challengeHistory || [];

        let statsHtml = '';
        let feedbackHtml = '';

        if (challengeHistory.length > 0) {
          const totalScore = challengeHistory.reduce((sum, c) => sum + (c.score || 0), 0);
          const avgPercentage = Math.round(challengeHistory.reduce((sum, c) => sum + (c.percentage || 0), 0) / challengeHistory.length);
          const lastChallenge = challengeHistory[challengeHistory.length - 1];

          statsHtml = `
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-star"></i></div>
                                <div class="stat-number">${totalScore}</div>
                                <div class="stat-label">Tổng điểm</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-history"></i></div>
                                <div class="stat-number">${challengeHistory.length}</div>
                                <div class="stat-label">Số lần thử thách</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-icon"><i class="fas fa-percent"></i></div>
                                <div class="stat-number">${avgPercentage}%</div>
                                <div class="stat-label">Tỷ lệ trung bình</div>
                            </div>
                        </div>
                    `;

          if (lastChallenge.aiFeedback) {
            feedbackHtml = `
                            <div class="feedback-card">
                                <div class="feedback-header">
                                    <i class="fas fa-robot"></i>
                                    <h3>Nhận xét từ thử thách gần nhất</h3>
                                </div>
                                <div class="feedback-content">
                                    ${lastChallenge.aiFeedback}
                                </div>
                            </div>
                        `;
          }
        }

        document.getElementById('mainContent').innerHTML = `
                    <div class="welcome-section">
                        <h1>Chào mừng ${user.displayName || 'bạn'} trở lại VIETVERSE!</h1>
                        <p>Khám phá vẻ đẹp văn hóa và lịch sử Việt Nam qua những trải nghiệm tương tác độc đáo. Hãy tiếp tục hành trình khám phá của bạn!</p>
                    </div>

                    ${statsHtml}

                    <div class="features-grid">
                        <a href="chatbot.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-robot"></i></div>
                            <div class="feature-title">Chatbot Sao Vàng</div>
                            <div class="feature-description">Trò chuyện với AI về lịch sử và văn hóa Việt Nam</div>
                        </a>

                        <a href="thuthach.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-trophy"></i></div>
                            <div class="feature-title">Thử thách kiến thức</div>
                            <div class="feature-description">Kiểm tra hiểu biết và nhận đánh giá chi tiết từ AI</div>
                        </a>

                        <a href="minigame.html" class="feature-card">
                            <div class="feature-icon"><i class="fas fa-gamepad"></i></div>
                            <div class="feature-title">Minigame</div>
                            <div class="feature-description">Giải trí với các trò chơi nhỏ về văn hóa Việt Nam</div>
                        </a>
                    </div>

                    ${feedbackHtml}
                `;
      } catch (error) {
        console.error('Lỗi khi load trang chủ:', error);
        loadGuestHomePage();
      }
    }
  </script>
</body>

</html>
