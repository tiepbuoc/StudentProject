<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sao Vàng - Lịch sử & Văn hóa Việt Nam</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Nền là ảnh bg.png, phủ kín toàn bộ khung hình */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 100%;
            height: 100vh;
            background: transparent;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Khoảng trống phía trên - 75px cố định */
        .chat-header-placeholder {
            height: 75px;
            width: 100%;
            background: transparent;
            flex-shrink: 0;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: transparent;
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 18px;
            max-width: 80%;
            word-wrap: break-word;
            line-height: 1.4;
            /* Hiệu ứng mờ cho bong bóng */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .user-message {
            background: rgba(139, 69, 19, 0.75); /* Nâu trong suốt */
            color: white;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 5px;
            border: 1px solid rgba(255, 215, 0, 0.5);
        }

        .bot-message {
            background: rgba(255, 255, 255, 0.75); /* Trắng trong suốt */
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(218, 165, 32, 0.5);
        }

        .bot-message strong {
            color: #8b4513;
        }

        .typing-indicator {
            display: flex;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.75);
            border-radius: 18px;
            max-width: 100px;
            margin-bottom: 15px;
            border: 1px solid rgba(218, 165, 32, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8b4513;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {

            0%,
            60%,
            100% {
                transform: translateY(0);
                opacity: 0.6;
            }

            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .input-area {
            padding: 15px 20px;
            background: transparent;
            border-top: none;
            display: flex;
            gap: 15px;
            backdrop-filter: none;
            flex-shrink: 0;
            width: 100%; /* Đảm bảo chiếm 100% width */
        }

        /* Container để tính toán tỷ lệ 20:1 cho tổng chiều rộng */
        .input-wrapper {
            display: flex;
            gap: 15px;
            width: 100%;
            align-items: center;
        }

        #user-input {
            flex: 1;
            padding: 0 22px; /* Padding ngang giữ nguyên, bỏ padding dọc vì đã tính vào height từ tỷ lệ */
            border: 2px solid #ffd700;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: background 0.3s;
            background-image: url('ta-bg.png');
            background-size: cover;
            background-position: center;
            color: white;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            font-weight: 500;
            height: 0; /* Tạm thời set 0, sẽ được tính toán bằng JS */
            min-height: 40px; /* Chiều cao tối thiểu để đảm bảo hiển thị */
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.9);
            font-style: italic;
        }

        #user-input:focus {
            background-color: rgba(0, 0, 0, 0.3);
            background-blend-mode: overlay;
        }

        #send-button {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            opacity: 1;
            border-radius: 0;
            /* Ảnh mặc định */
            background-image: url('send-nm.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            width: 0; /* Tạm thời set 0, sẽ được tính toán bằng JS */
            height: 0; /* Tạm thời set 0, sẽ được tính toán bằng JS */
            aspect-ratio: 1/1; /* Tỉ lệ 1:1 cho nút vuông */
            min-width: 40px; /* Kích thước tối thiểu */
            min-height: 40px;
        }

        #send-button:hover {
            opacity: 0.7;
            background-image: url('send-m.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        #send-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            pointer-events: none;
        }

        .clear-btn {
            position: fixed;
            top: 15px;
            right: 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #ffd700;
            color: #ffd700;
            padding: 5px 15px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 10;
        }

        .clear-btn:hover {
            background: #ffd700;
            color: #8b4513;
        }

        .error-message {
            color: #d32f2f;
            background: rgba(255, 205, 210, 0.9);
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Placeholder giữ khoảng trống 75px phía trên -->
        <div class="chat-header-placeholder"></div>
        
        <!-- Nút xóa lịch sử vẫn được giữ lại -->
        <button class="clear-btn" onclick="clearHistory()">Xóa lịch sử</button>

        <div id="messages" class="messages-container"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi tôi về lịch sử và văn hóa Việt Nam..."
                    autocomplete="off">
                <button id="send-button" onclick="sendMessage()"></button>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyA9wqELJsr2sfgOK3wZKZ9macWz6bQIOxw';
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${API_KEY}`;

        let currentContext = 'none';
        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const inputWrapper = document.querySelector('.input-wrapper');

        // Hàm tính toán kích thước theo tỷ lệ 20:1
        function resizeInputArea() {
            if (!inputWrapper || !userInput || !sendButton) return;
            
            // Lấy chiều rộng của wrapper
            const wrapperWidth = inputWrapper.offsetWidth;
            
            // Khoảng cách gap giữa input và button
            const gap = 15; // 15px gap từ CSS
            
            // Tính toán chiều cao dựa trên tỷ lệ 20:1 (width:height)
            // Với tổng chiều rộng (input width + button width + gap) và tỷ lệ 20:1 cho tổng thể
            // Chiều cao = (wrapperWidth - gap) / 20 * (20/21?) 
            // Thực tế: wrapperWidth = inputWidth + buttonWidth + gap
            // Và inputWidth + buttonWidth = wrapperWidth - gap
            // Với tỷ lệ 20:1, chiều cao = (wrapperWidth - gap) / 20
            
            let totalWidth = wrapperWidth - gap; // Tổng chiều rộng input + button
            
            // Chiều cao tính theo tỷ lệ 20:1 (20 phần chiều ngang : 1 phần chiều cao)
            let height = Math.max(40, Math.round(totalWidth / 20)); // Tối thiểu 40px
            
            // Điều chỉnh để button vuông và input có cùng chiều cao
            userInput.style.height = height + 'px';
            userInput.style.lineHeight = height + 'px'; // Canh giữa chữ theo chiều dọc
            
            // Button vuông có kích thước bằng chiều cao
            sendButton.style.width = height + 'px';
            sendButton.style.height = height + 'px';
        }

        // Load lịch sử từ localStorage
        function loadChatHistory() {
            const savedMessages = localStorage.getItem('saoVangChatHistory');
            const savedContext = localStorage.getItem('saoVangContext');

            if (savedMessages) {
                messagesContainer.innerHTML = savedMessages;
            }

            if (savedContext) {
                currentContext = savedContext;
            }

            scrollToBottom();
        }

        // Lưu lịch sử vào localStorage
        function saveChatHistory() {
            localStorage.setItem('saoVangChatHistory', messagesContainer.innerHTML);
            localStorage.setItem('saoVangContext', currentContext);
        }

        // Xóa lịch sử
        function clearHistory() {
            if (confirm('Bạn có chắc muốn xóa toàn bộ lịch sử trò chuyện?')) {
                messagesContainer.innerHTML = '';
                currentContext = 'none';
                localStorage.removeItem('saoVangChatHistory');
                localStorage.removeItem('saoVangContext');
                addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?');
            }
        }

        // Thêm tin nhắn vào giao diện
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                messageDiv.innerHTML = `<strong>Sao Vàng:</strong><br>${content}`;
            } else {
                messageDiv.textContent = content;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            saveChatHistory();
        }

        // Hiển thị lỗi
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.textContent = message;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        // Cuộn xuống cuối
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Hiển thị typing indicator
        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        // Xóa typing indicator
        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Gọi Gemini API
        async function callGeminiAPI(userMessage) {
            let prompt = `Bạn là Sao Vàng - chuyên gia về lịch sử và văn hóa Việt Nam. 
            Bối cảnh cuộc trò chuyện hiện tại: ${currentContext}
            
            Yêu cầu của người dùng: ${userMessage}
            
            Một số lưu ý trong lúc trả lời:
            - Phần câu trả lời (answer) không được quá dài tầm dưới 50 từ thôi

            Hãy phản hồi dưới định dạng JSON với 2 phần:
            1. "answer": Câu trả lời chi tiết, chính xác, dựa trên yêu cầu của người dùng và bối cảnh cuộc trò chuyện.
            2. "newContext": Tổng kết bối cảnh mới của cuộc trò chuyện (tóm tắt dựa trên bối cảnh cũ, yêu cầu mới và câu trả lời, chỉ giữ thông tin quan trọng nhất cho các câu hỏi tiếp theo).
            
            Ví dụ format:
            {
                "answer": "Câu trả lời của bạn...",
                "newContext": "Tóm tắt bối cảnh mới..."
            }`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }]
                })
            });

            if (!response.ok) {
                throw new Error('Lỗi kết nối đến Gemini API');
            }

            const data = await response.json();
            const textResponse = data.candidates[0].content.parts[0].text;

            const jsonMatch = textResponse.match(/\{[\s\S]*\}/);
            if (!jsonMatch) {
                throw new Error('Không thể parse JSON từ response');
            }

            return JSON.parse(jsonMatch[0]);
        }

        // Xử lý gửi tin nhắn
        async function sendMessage() {
            const message = userInput.value.trim();

            if (!message) return;

            if (API_KEY === 'YOUR_GEMINI_API_KEY') {
                showError('Vui lòng cấu hình Gemini API key trong mã nguồn!');
                return;
            }

            addMessage('user', message);
            userInput.value = '';

            userInput.disabled = true;
            sendButton.disabled = true;

            showTypingIndicator();

            try {
                const response = await callGeminiAPI(message);

                removeTypingIndicator();

                addMessage('bot', response.answer);

                currentContext = response.newContext;
                saveChatHistory();

            } catch (error) {
                removeTypingIndicator();
                showError('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại sau.');
                console.error('Error:', error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        // Gửi tin nhắn khi nhấn Enter
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        // Resize khi window thay đổi kích thước
        window.addEventListener('resize', () => {
            resizeInputArea();
        });

        // Load lịch sử và resize khi trang được tải
        window.addEventListener('load', () => {
            loadChatHistory();
            if (messagesContainer.children.length === 0) {
                addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?');
            }
            // Gọi resize sau khi load xong
            setTimeout(resizeInputArea, 100); // Timeout nhỏ để đảm bảo DOM đã render
        });

        // Observe sự thay đổi kích thước của wrapper (phòng trường hợp có thay đổi layout)
        const resizeObserver = new ResizeObserver(() => {
            resizeInputArea();
        });
        
        if (inputWrapper) {
            resizeObserver.observe(inputWrapper);
        }
    </script>
</body>
</html>
