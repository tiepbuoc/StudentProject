<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Đăng nhập</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(55, 1, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #ffd700;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 40px;
            width: auto;
        }

        .logo span {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s;
            font-weight: 500;
        }

        .nav-links a:hover {
            background: #ffd700;
            color: #370100;
        }

        .nav-links a.active {
            background: #ffd700;
            color: #370100;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid #ffd700;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffd700;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            color: #370100;
            font-weight: bold;
            transition: all 0.3s;
        }

        .auth-tab.active {
            color: #ffd700;
            border-bottom: 3px solid #ffd700;
            margin-bottom: -2px;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #370100;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: #ffd700;
            outline: none;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #370100;
            color: white;
            border: 2px solid #ffd700;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .auth-btn:hover {
            background: #5a0200;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .error-message {
            color: #d32f2f;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        .success-message {
            color: #388e3c;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
            
            .auth-container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="VIETVERSE Logo">
            <span>VIETVERSE</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="chatbot.html">Chatbot</a>
            <a href="thuthach.html">Thử thách</a>
            <a href="minigame.html">Minigame</a>
            <a href="login.html" class="active">Đăng nhập</a>
        </div>
    </div>

    <div class="container">
        <div class="auth-container">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">Đăng nhập</div>
                <div class="auth-tab" onclick="switchTab('register')">Đăng ký</div>
            </div>

            <div id="login-form" class="auth-form active">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="login-password" placeholder="Nhập mật khẩu">
                </div>
                <button class="auth-btn" onclick="login()">Đăng nhập</button>
                <div id="login-message" class="error-message"></div>
            </div>

            <div id="register-form" class="auth-form">
                <div class="form-group">
                    <label>Họ tên</label>
                    <input type="text" id="register-name" placeholder="Nhập họ tên của bạn">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="register-email" placeholder="Nhập email của bạn">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="register-password" placeholder="Nhập mật khẩu">
                </div>
                <div class="form-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" id="register-confirm-password" placeholder="Xác nhận mật khẩu">
                </div>
                <button class="auth-btn" onclick="register()">Đăng ký</button>
                <div id="register-message" class="error-message"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="config.js"></script>
    <script>
        // Khởi tạo Firebase
        const firebaseConfig = getFirebaseConfig();
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Kiểm tra trạng thái đăng nhập
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Nếu đã đăng nhập, chuyển về trang chủ
                window.location.href = 'index.html';
            }
        });

        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.auth-tab');

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
            } else {
                loginForm.classList.remove('active');
                registerForm.classList.add('active');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
            }
        }

        function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const messageDiv = document.getElementById('login-message');

            if (!email || !password) {
                messageDiv.textContent = 'Vui lòng nhập đầy đủ email và mật khẩu';
                return;
            }

            auth.signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = 'Đăng nhập thành công! Đang chuyển hướng...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    messageDiv.className = 'error-message';
                    switch (error.code) {
                        case 'auth/user-not-found':
                            messageDiv.textContent = 'Email không tồn tại';
                            break;
                        case 'auth/wrong-password':
                            messageDiv.textContent = 'Sai mật khẩu';
                            break;
                        default:
                            messageDiv.textContent = 'Đăng nhập thất bại: ' + error.message;
                    }
                });
        }

        function register() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            const messageDiv = document.getElementById('register-message');

            if (!name || !email || !password || !confirmPassword) {
                messageDiv.textContent = 'Vui lòng nhập đầy đủ thông tin';
                return;
            }

            if (password !== confirmPassword) {
                messageDiv.textContent = 'Mật khẩu xác nhận không khớp';
                return;
            }

            if (password.length < 6) {
                messageDiv.textContent = 'Mật khẩu phải có ít nhất 6 ký tự';
                return;
            }

            auth.createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Cập nhật displayName
                    return userCredential.user.updateProfile({
                        displayName: name
                    }).then(() => {
                        // Tạo document cho user trong Firestore
                        return db.collection('users').doc(userCredential.user.uid).set({
                            name: name,
                            email: email,
                            createdAt: new Date().toISOString(),
                            lastChallenge: null,
                            chatHistory: [],
                            challengeHistory: []
                        });
                    });
                })
                .then(() => {
                    messageDiv.className = 'success-message';
                    messageDiv.textContent = 'Đăng ký thành công! Đang chuyển hướng...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                })
                .catch((error) => {
                    messageDiv.className = 'error-message';
                    if (error.code === 'auth/email-already-in-use') {
                        messageDiv.textContent = 'Email đã được sử dụng';
                    } else {
                        messageDiv.textContent = 'Đăng ký thất bại: ' + error.message;
                    }
                });
        }
    </script>
</body>
</html>
