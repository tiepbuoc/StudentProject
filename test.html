
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tạo Bằng Khen</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#f4f4f4;
}

input{
    padding:10px;
    font-size:16px;
    width:250px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:10px;
    cursor:pointer;
}

canvas{
    margin-top:20px;
    max-width:90%;
    border:1px solid #ccc;
}
</style>
</head>

<body>

<h2>Tạo Bằng Khen</h2>

<input id="nameInput" placeholder="Nhập tên người nhận">
<br>

<button onclick="generate()">Tạo bằng khen</button>
<button onclick="downloadImage()">Tải PNG</button>

<br>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const img = new Image();
img.src = "bangkhen.png";

img.onload = function(){
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img,0,0);
}

function generate(){

    const name = document.getElementById("nameInput").value;

    ctx.drawImage(img,0,0);

    ctx.font = "bold 80px serif";
    ctx.fillStyle = "#000";

    // ===== CĂN LỀ TRÁI =====
    ctx.textAlign = "left";

    // ===== TỌA ĐỘ TÊN =====
    const x = 730;
    const y = 585;

    ctx.fillText(name, x, y);
}

function downloadImage(){

    const link = document.createElement("a");
    link.download = "bangkhen.png";
    link.href = canvas.toDataURL("image/png");

    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}


// hiển thị tọa độ chuột để căn chỉnh
canvas.addEventListener("mousemove", function(e){

const rect = canvas.getBoundingClientRect();
const x = e.clientX - rect.left;
const y = e.clientY - rect.top;

console.log("x:",Math.floor(x),"y:",Math.floor(y));

});

</script>

</body>
</html>
