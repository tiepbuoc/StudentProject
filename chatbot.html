<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sao Vàng - Chatbot văn hóa Việt Nam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 2000px;
            height: 2000px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
            top: -10%;
            right: -20%;
            opacity: 0.1;
            animation: float 20s infinite linear;
        }

        body::after {
            content: '';
            position: absolute;
            width: 1500px;
            height: 1500px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff8c00 100%);
            bottom: -10%;
            left: -20%;
            opacity: 0.1;
            animation: float 15s infinite linear reverse;
        }

        @keyframes float {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 40px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2));
        }

        .logo span {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-links a {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            font-size: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
        }

        .nav-links a:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-3px);
            border-color: #ffd700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .nav-links a.active {
            background: #ffd700;
            color: #333;
            border-color: #ffd700;
        }

        .user-menu {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            background: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 18px;
        }

        .user-name {
            color: white;
            font-weight: 500;
            font-size: 14px;
        }

        .logout-btn {
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            color: #ffd700;
            transform: scale(1.1);
        }

        .chat-container {
            height: 100vh;
            padding-top: 80px;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 25px;
            position: relative;
            animation: messageSlide 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: rgba(55, 1, 0, 0.8);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bot-message {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .bot-message strong {
            color: #ffd700;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            max-width: 100px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            align-self: flex-start;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.6;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .suggested-questions {
            padding: 20px 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .suggested-question-btn {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-weight: 500;
        }

        .suggested-question-btn:hover {
            background: rgba(255, 215, 0, 0.3);
            transform: translateY(-3px);
            border-color: #ffd700;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .input-area {
            padding: 20px 40px;
            background: transparent;
            display: flex;
            gap: 15px;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            gap: 15px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 5px 5px 5px 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.7);
        }

        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 16px;
            padding: 12px 0;
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        #send-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #333;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #send-button:hover:not(:disabled) {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 99, 71, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-align: center;
            margin: 10px 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: messageSlide 0.3s ease;
        }

        /* Scrollbar styling */
        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255,215,0,0.5);
            border-radius: 10px;
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #ffd700;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.png" alt="VIETVERSE Logo">
            <span>VIETVERSE</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i></a>
            <a href="chatbot.html" class="active"><i class="fas fa-robot"></i></a>
            <a href="thuthach.html"><i class="fas fa-trophy"></i></a>
            <a href="minigame.html"><i class="fas fa-gamepad"></i></a>
        </div>
        <div class="user-menu" id="userMenu">
            <div class="user-avatar">
                <i class="fas fa-user"></i>
            </div>
            <span class="user-name" id="userName"></span>
            <button class="logout-btn" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i>
            </button>
        </div>
    </div>

    <div class="chat-container">
        <div id="messages" class="messages-container"></div>

        <div class="suggested-questions" id="suggestedQuestions"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi tôi về lịch sử và văn hóa Việt Nam..." autocomplete="off">
                <button id="send-button" onclick="sendMessage()">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Gemini API key (đã đảo ngược)
        const GEMINI_KEY = (() => {
            const reversed = 'gVH30eaBb4DV1utfJ94m0GVymawfG5QlCySazIA';
            return reversed.split('').reverse().join('');
        })();
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${GEMINI_KEY}`;

        let currentContext = 'none';
        let currentUser = null;
        let lastChallengeFeedback = '';

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const suggestedQuestionsDiv = document.getElementById('suggestedQuestions');

        const allSuggestedQuestions = [
            "Vua Hùng là ai?",
            "Bạch Đằng 938?",
            "Nguồn gốc áo dài?",
            "Tết nghĩa là gì?",
            "Phở Hà Nội vs SG?",
            "Văn Miếu năm nào?",
            "Trần Hưng Đạo?",
            "Bánh chưng tích?",
            "Điện Biên Phủ?",
            "Ca trù là gì?",
            "Quốc hiệu đầu?",
            "Chùa Hương khi?",
            "Lý Thái Tổ?",
            "Múa rối nước?",
            "Trống Đông Sơn?",
            "Trung Thu là?",
            "Rạch Gầm năm?",
            "Nón lá từ đâu?",
            "Quang Trung?",
            "Gốm Bát Tràng?"
        ];

        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = user.displayName || 'Người dùng';
            currentUser = user;
            
            await loadChatHistory(user.uid);
            await loadLastChallengeFeedback(user.uid);
            updateSuggestedQuestions();
            addWelcomeMessage();
        });

        async function loadChatHistory(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const chatHistory = userDoc.data().chatHistory || [];
                    
                    messagesContainer.innerHTML = '';
                    
                    chatHistory.forEach(msg => {
                        addMessage(msg.role, msg.content, false);
                    });
                    
                    if (chatHistory.length > 0) {
                        currentContext = chatHistory[chatHistory.length - 1].context || 'none';
                    }
                }
            } catch (error) {
                console.error('Lỗi khi load lịch sử:', error);
            }
        }

        async function loadLastChallengeFeedback(userId) {
            try {
                const userDoc = await db.collection('users').doc(userId).get();
                if (userDoc.exists) {
                    const challengeHistory = userDoc.data().challengeHistory || [];
                    if (challengeHistory.length > 0) {
                        lastChallengeFeedback = challengeHistory[challengeHistory.length - 1].aiFeedback || '';
                    }
                }
            } catch (error) {
                console.error('Lỗi khi load feedback:', error);
            }
        }

        async function saveChatHistory() {
            if (!currentUser) return;

            try {
                const messages = [];
                const messageElements = messagesContainer.querySelectorAll('.message');
                
                messageElements.forEach(el => {
                    if (el.classList.contains('user-message')) {
                        messages.push({
                            role: 'user',
                            content: el.textContent,
                            context: currentContext
                        });
                    } else if (el.classList.contains('bot-message')) {
                        const content = el.innerHTML.replace('<strong>Sao Vàng:</strong><br>', '');
                        messages.push({
                            role: 'bot',
                            content: content,
                            context: currentContext
                        });
                    }
                });

                await db.collection('users').doc(currentUser.uid).update({
                    chatHistory: messages
                });
            } catch (error) {
                console.error('Lỗi khi lưu lịch sử:', error);
            }
        }

        function addWelcomeMessage() {
            if (messagesContainer.children.length === 0) {
                const welcomeMsg = lastChallengeFeedback ? 
                    `Xin chào! Tôi là Sao Vàng. Tôi thấy bạn đã làm bài kiểm tra gần đây: "${lastChallengeFeedback.substring(0, 100)}..." Hôm nay bạn muốn tìm hiểu thêm về điều gì?` :
                    'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?';
                
                addMessage('bot', welcomeMsg);
            }
        }

        function updateSuggestedQuestions() {
            const shuffled = [...allSuggestedQuestions].sort(() => 0.5 - Math.random());
            const selected = shuffled.slice(0, 6);
            
            suggestedQuestionsDiv.innerHTML = '';
            
            selected.forEach(question => {
                const button = document.createElement('button');
                button.classList.add('suggested-question-btn');
                button.innerHTML = `<i class="fas fa-question-circle" style="margin-right: 8px;"></i>${question}`;
                button.onclick = () => {
                    userInput.value = question;
                    sendMessage();
                };
                suggestedQuestionsDiv.appendChild(button);
            });
        }

        function addMessage(role, content, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                messageDiv.innerHTML = `<strong><i class="fas fa-star" style="color: #ffd700; margin-right: 8px;"></i>Sao Vàng:</strong><br>${content}`;
            } else {
                messageDiv.innerHTML = `<i class="fas fa-user" style="margin-right: 8px;"></i>${content}`;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            
            if (save) {
                saveChatHistory();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>${message}`;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
            setTimeout(() => errorDiv.remove(), 5000);
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function callGeminiAPI(userMessage) {
            const prompt = `Bạn là Sao Vàng - chuyên gia về lịch sử và văn hóa Việt Nam. 
            Bối cảnh: ${currentContext}
            
            Thông tin người dùng (tham khảo nếu cần): ${lastChallengeFeedback || 'Chưa có dữ liệu'}
            
            Câu hỏi: ${userMessage}
            
            Hãy trả lời chi tiết, chính xác và sinh động về văn hóa Việt Nam.`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: prompt
                        }]
                    }]
                })
            });

            if (!response.ok) throw new Error('Lỗi kết nối Gemini API');

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || sendButton.disabled) return;

            addMessage('user', message);
            userInput.value = '';

            userInput.disabled = true;
            sendButton.disabled = true;
            showTypingIndicator();

            try {
                const response = await callGeminiAPI(message);
                removeTypingIndicator();
                addMessage('bot', response);
                currentContext = message;
            } catch (error) {
                removeTypingIndicator();
                showError('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại sau.');
                console.error('Error:', error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });
    </script>
</body>
</html>
