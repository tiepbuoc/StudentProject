<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sao Vàng - Lịch sử & Văn hóa Việt Nam</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .chat-container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 45px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .logo span {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links a:hover {
            background: #ffd700;
            color: #370100;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .nav-links a.active {
            background: #ffd700;
            color: #370100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info i {
            color: #ffd700;
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            padding: 15px 22px;
            border-radius: 25px;
            max-width: 70%;
            word-wrap: break-word;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
            font-size: 15px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: rgba(55, 1, 0, 0.9);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .bot-message {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .bot-message strong {
            color: #ffd700;
            font-size: 16px;
            display: block;
            margin-bottom: 5px;
        }

        .typing-indicator {
            display: flex;
            padding: 15px 22px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 25px;
            max-width: 100px;
            align-self: flex-start;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            30% {
                transform: translateY(-10px);
                opacity: 1;
            }
        }

        .suggested-questions {
            padding: 15px 30px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            flex-shrink: 0;
        }

        .suggested-question-btn {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 22px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .suggested-question-btn:hover {
            background: #8b4513;
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .input-area {
            padding: 20px 30px;
            background: transparent;
            flex-shrink: 0;
        }

        .input-wrapper {
            display: flex;
            gap: 15px;
            align-items: center;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 60px;
            padding: 5px 5px 5px 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #user-input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
            color: white;
            padding: 15px 0;
        }

        #user-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-style: italic;
        }

        #send-button {
            width: 55px;
            height: 55px;
            border: none;
            border-radius: 50%;
            background: #8b4513;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        #send-button:hover:not(:disabled) {
            background: #a55a2a;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.4);
        }

        #send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(244, 67, 54, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid #f44336;
            color: #ff8a80;
            padding: 12px 20px;
            border-radius: 15px;
            margin: 10px 30px;
            text-align: center;
            animation: fadeIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 15px;
                padding: 15px;
            }
            
            .message {
                max-width: 85%;
            }
            
            .suggested-question-btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="navbar">
            <div class="logo">
                <img src="logo.png" alt="VIETVERSE Logo">
                <span>VIETVERSE</span>
            </div>
            <div class="nav-links">
                <a href="index.html" title="Trang chủ"><i class="fas fa-home"></i></a>
                <a href="chatbot.html" class="active" title="Chatbot"><i class="fas fa-robot"></i></a>
                <a href="thuthach.html" title="Thử thách"><i class="fas fa-trophy"></i></a>
                <a href="minigame.html" title="Minigame"><i class="fas fa-gamepad"></i></a>
            </div>
            <div class="user-info" id="userInfo">
                <i class="fas fa-user-circle"></i>
                <span id="userName">Đang tải...</span>
                <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
            </div>
        </div>

        <div id="messages" class="messages-container"></div>

        <div class="suggested-questions" id="suggestedQuestions"></div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="user-input" placeholder="Hỏi tôi về lịch sử và văn hóa Việt Nam..." autocomplete="off">
                <button id="send-button" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        // Gemini API key (đã đảo ngược để bảo mật)
        const REVERSED_GEMINI_KEY = 'gVH30eaBb4DV1utfJ94m0GVymawfG5QlCySazIA';
        function reverseString(str) {
            return str.split('').reverse().join('');
        }
        const GEMINI_KEY = reverseString(REVERSED_GEMINI_KEY);
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_KEY}`;

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentContext = 'none';
        let lastChallengeFeedback = '';

        const messagesContainer = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');
        const suggestedQuestionsDiv = document.getElementById('suggestedQuestions');

        // 20 câu hỏi gợi ý
        const allSuggestedQuestions = [
            "Vua Hùng là ai?",
            "Chiến thắng Bạch Đằng 938?",
            "Nguồn gốc áo dài?",
            "Tết Nguyên Đán nghĩa là gì?",
            "Sự khác biệt phở Hà Nội và Sài Gòn?",
            "Văn Miếu được xây năm nào?",
            "Trần Hưng Đạo là ai?",
            "Sự tích bánh chưng?",
            "Chiến dịch Điện Biên Phủ?",
            "Ca trù là gì?",
            "Quốc hiệu đầu tiên?",
            "Chùa Hương ở đâu?",
            "Lý Thái Tổ dời đô năm nào?",
            "Múa rối nước bắt nguồn từ đâu?",
            "Trống đồng Đông Sơn thời nào?",
            "Tết Trung Thu là tết gì?",
            "Chiến thắng Rạch Gầm - Xoài Mút?",
            "Nón lá có từ bao giờ?",
            "Vua Quang Trung đại phá quân Thanh?",
            "Gốm Bát Tràng nổi tiếng thế nào?"
        ];

        // Kiểm tra đăng nhập
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = user.displayName || 'Người dùng';
            currentUser = user;
            
            // Load lịch sử chat
            await loadChatHistory();
            
            // Load feedback từ thử thách
            await loadLastChallengeFeedback();
        });

        async function loadLastChallengeFeedback() {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const challengeHistory = userData.challengeHistory || [];
                    if (challengeHistory.length > 0) {
                        lastChallengeFeedback = challengeHistory[challengeHistory.length - 1].aiFeedback || '';
                    }
                }
            } catch (error) {
                console.error('Lỗi khi load feedback:', error);
            }
        }

        async function loadChatHistory() {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const chatHistory = userData.chatHistory || [];
                    
                    messagesContainer.innerHTML = '';
                    
                    if (chatHistory.length > 0) {
                        chatHistory.forEach(msg => {
                            addMessage(msg.role, msg.content, false);
                        });
                        currentContext = chatHistory[chatHistory.length - 1].context || 'none';
                    } else {
                        addWelcomeMessage();
                    }
                } else {
                    addWelcomeMessage();
                }
            } catch (error) {
                console.error('Lỗi khi load lịch sử:', error);
                addWelcomeMessage();
            }
        }

        function addWelcomeMessage() {
            addMessage('bot', 'Xin chào! Tôi là Sao Vàng, chuyên gia về lịch sử và văn hóa Việt Nam. Bạn muốn tìm hiểu về điều gì?', false);
        }

        async function saveChatHistory() {
            try {
                const messages = [];
                const messageElements = messagesContainer.querySelectorAll('.message');
                
                messageElements.forEach(el => {
                    if (el.classList.contains('user-message')) {
                        messages.push({
                            role: 'user',
                            content: el.textContent,
                            context: currentContext
                        });
                    } else if (el.classList.contains('bot-message')) {
                        const content = el.innerHTML.replace('<strong>Sao Vàng:</strong><br>', '').replace(/<[^>]*>/g, '');
                        messages.push({
                            role: 'bot',
                            content: content,
                            context: currentContext
                        });
                    }
                });

                await db.collection('users').doc(currentUser.uid).update({
                    chatHistory: messages
                });
            } catch (error) {
                console.error('Lỗi khi lưu lịch sử:', error);
            }
        }

        function getRandomQuestions(n) {
            const shuffled = [...allSuggestedQuestions].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, n);
        }

        function updateSuggestedQuestions() {
            const width = window.innerWidth;
            const n = width < 480 ? 3 : width < 768 ? 4 : width < 1024 ? 5 : 6;
            const questions = getRandomQuestions(n);
            
            suggestedQuestionsDiv.innerHTML = questions.map(q => 
                `<button class="suggested-question-btn" onclick="useSuggestedQuestion('${q.replace(/'/g, "\\'")}')">${q}</button>`
            ).join('');
        }

        function addMessage(role, content, save = true) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', role === 'user' ? 'user-message' : 'bot-message');

            if (role === 'bot') {
                messageDiv.innerHTML = `<strong>Sao Vàng <i class="fas fa-star" style="color: #ffd700; font-size: 14px;"></i></strong><br>${content}`;
            } else {
                messageDiv.innerHTML = `<i class="fas fa-user" style="margin-right: 8px;"></i>${content}`;
            }

            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            
            if (save) {
                saveChatHistory();
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.classList.add('error-message');
            errorDiv.innerHTML = `<i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i>${message}`;
            messagesContainer.appendChild(errorDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.classList.add('typing-indicator');
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';
            messagesContainer.appendChild(indicator);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function useSuggestedQuestion(question) {
            if (sendButton.disabled) return;
            userInput.value = question;
            sendMessage();
        }

        async function callGeminiAPI(userMessage) {
            const prompt = `Bạn là Sao Vàng - chuyên gia về lịch sử và văn hóa Việt Nam. 
Bối cảnh hiện tại: ${currentContext}

Thông tin người dùng (có thể tham khảo): ${lastChallengeFeedback || 'Chưa có dữ liệu thử thách'}

Câu hỏi: ${userMessage}

Hãy trả lời bằng tiếng Việt, chính xác, chi tiết và thân thiện.

Trả lời dưới dạng JSON:
{
    "answer": "Câu trả lời chi tiết...",
    "newContext": "Tóm tắt ngắn bối cảnh mới..."
}`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) throw new Error('Lỗi kết nối API');
            
            const data = await response.json();
            const text = data.candidates[0].content.parts[0].text;
            const jsonMatch = text.match(/\{[\s\S]*\}/);
            
            if (!jsonMatch) throw new Error('Không thể parse JSON');
            
            return JSON.parse(jsonMatch[0]);
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage('user', message);
            userInput.value = '';

            userInput.disabled = true;
            sendButton.disabled = true;

            showTypingIndicator();

            try {
                const response = await callGeminiAPI(message);
                removeTypingIndicator();
                addMessage('bot', response.answer);
                currentContext = response.newContext;
            } catch (error) {
                removeTypingIndicator();
                showError('Xin lỗi, đã có lỗi xảy ra. Vui lòng thử lại sau.');
                console.error('Error:', error);
            } finally {
                userInput.disabled = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !sendButton.disabled) {
                sendMessage();
            }
        });

        window.addEventListener('resize', updateSuggestedQuestions);
        window.addEventListener('load', () => {
            updateSuggestedQuestions();
            setTimeout(scrollToBottom, 100);
        });
    </script>
</body>
</html>
