<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Thử thách kiến thức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fff9f0 0%, #ffe6d1 100%);
            min-height: 100vh;
            position: relative;
            color: var(--white);
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {
            0%,100% { transform: translate(0,0); }
            10% { transform: translate(-2%,-3%); }
            20% { transform: translate(3%,2%); }
            30% { transform: translate(-1%,4%); }
            40% { transform: translate(4%,-1%); }
            50% { transform: translate(-3%,3%); }
            60% { transform: translate(2%,-4%); }
            70% { transform: translate(-4%,1%); }
            80% { transform: translate(1%,3%); }
            90% { transform: translate(3%,-2%); }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }
        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }
        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }
        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-30px) scale(1.05); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 1%;
            height: 72px;
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
            transition: all .3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .nav-links a.active {
            background: var(--jade);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--white);
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        .menu-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .menu-container::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Leaderboard Styles */
        .leaderboard-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }

        .leaderboard-container::before {
            content: '';
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .leaderboard-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .leaderboard-header i {
            font-size: 2.2em;
            color: var(--jade);
            margin-bottom: 10px;
            text-shadow: 0 0 30px var(--jade-glow);
            background: var(--jade-pale);
            padding: 15px;
            border: 1px solid var(--border);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
            margin-right: auto;
            border-radius: 50%;
        }

        .leaderboard-header h2 {
            color: var(--jade2);
            font-size: 1.8em;
            margin-bottom: 5px;
            font-family: 'Fraunces', serif;
        }

        .leaderboard-header p {
            color: var(--text-mid);
            font-size: 0.95em;
        }

        /* Top 3 Cards */
        .top3 {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 30px 0 25px;
            position: relative;
            z-index: 2;
        }

        .card {
            width: 130px;
            padding: 30px 10px 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.15);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.3, 1.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            position: relative;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 25px 35px -8px var(--jade-glow);
        }

        .card .user-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: white;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 0 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .card .score {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 12px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .rank-label {
            font-weight: 600;
            font-size: 13px;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
        }

        .top1-card {
            background: linear-gradient(145deg, #ffd966, #ff9f4a, #ff8c42);
            height: 170px;
            order: 2;
        }

        .top2-card {
            background: linear-gradient(145deg, #4facfe, #00c6fb, #3a9efd);
            height: 150px;
            order: 1;
        }

        .top3-card {
            background: linear-gradient(145deg, #a18cd1, #fbc2eb, #b392e0);
            height: 150px;
            order: 3;
        }

        .card .crown-icon,
        .card .trophy-icon {
            position: absolute;
            top: -30px;
            font-size: 28px;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.3));
            left: 50%;
            transform: translateX(-50%);
        }

        .top1-card .crown-icon {
            color: #FFD700;
        }

        .top2-card .trophy-icon {
            color: #C0C0C0;
        }

        .top3-card .trophy-icon {
            color: #CD7F32;
        }

        /* Ranking list */
        .ranking-list {
            background: var(--jade-pale);
            border-radius: 25px;
            padding: 15px;
            border: 1px solid var(--border);
            margin: 15px 0 0;
            position: relative;
            z-index: 2;
            max-height: 350px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--jade) var(--jade-pale);
        }

        .ranking-list::-webkit-scrollbar {
            width: 6px;
        }

        .ranking-list::-webkit-scrollbar-track {
            background: var(--jade-pale);
            border-radius: 10px;
        }

        .ranking-list::-webkit-scrollbar-thumb {
            background: var(--jade);
            border-radius: 10px;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-radius: 18px;
            transition: all 0.3s;
            margin-bottom: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid transparent;
        }

        .row:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            transform: translateX(5px);
            box-shadow: 0 5px 12px var(--jade-glow);
        }

        .user {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .rank-number {
            width: 28px;
            height: 28px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 13px;
            color: var(--jade2);
        }

        .user-info {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .user-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--white);
        }

        .user-badge {
            font-size: 10px;
            color: var(--jade2);
            display: flex;
            align-items: center;
            gap: 4px;
            opacity: 0.9;
        }

        .score-badge {
            font-weight: 700;
            font-size: 18px;
            background: var(--jade-pale);
            padding: 5px 12px;
            border-radius: 25px;
            border: 1px solid var(--border);
            color: var(--jade2);
            min-width: 70px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 3px;
        }

        .score-badge i {
            font-size: 12px;
            color: var(--gold);
        }

        .loading-rank {
            text-align: center;
            color: var(--text-dim);
            padding: 30px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .menu-header i {
            font-size: 4em;
            color: var(--jade);
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--jade-glow);
        }

        .menu-header h1 {
            color: var(--jade2);
            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Fraunces', serif;
        }

        .menu-header p {
            color: var(--text-mid);
            font-size: 1.1em;
        }

        .menu-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .menu-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--jade-pale);
            color: var(--white);
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px var(--jade-glow);
        }

        .menu-btn i {
            font-size: 1.2em;
        }

        .menu-btn.start-btn {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
        }

        .menu-btn.start-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        .menu-btn.history-btn:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-5px);
            border-color: var(--jade);
        }

        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .history-section.show {
            max-height: 2000px;
        }

        .history-card {
            background: linear-gradient(135deg, rgba(255, 249, 240, 0.9) 0%, rgba(255, 239, 224, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--jade);
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .history-date {
            color: var(--jade);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-score {
            background: var(--jade-pale);
            padding: 5px 15px;
            border-radius: 30px;
            color: var(--jade2);
            font-weight: bold;
        }

        .history-details {
            color: var(--text-mid);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .history-feedback {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 0;
            padding: 0 15px;
            background: var(--jade-pale);
            border-radius: 10px;
            border-left: 4px solid var(--jade);
        }

        .history-feedback.show {
            max-height: 500px;
            margin-top: 15px;
            padding: 15px;
        }

        .history-feedback-content {
            color: var(--white);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .no-history {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
            font-size: 1.1em;
        }

        .expand-icon {
            color: var(--jade);
            transition: transform 0.3s ease;
        }

        .expand-icon.rotated {
            transform: rotate(90deg);
        }

        .quiz-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            margin-bottom: 30px;
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .question-number {
            color: var(--jade);
            font-weight: bold;
            font-size: 1.1em;
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--jade);
            white-space: nowrap;
        }

        .question-text {
            font-size: 1.4em;
            color: var(--white);
            line-height: 1.6;
            font-weight: 500;
            flex: 1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--white);
        }

        .option:hover {
            background: rgba(255, 140, 66, 0.15);
            border-color: var(--jade);
            transform: translateX(5px);
        }

        .option.selected {
            background: var(--jade-pale);
            border-color: var(--jade);
            border-width: 2px;
        }

        .option-letter {
            width: 35px;
            height: 35px;
            background: var(--jade-pale);
            border: 1px solid var(--jade);
            color: var(--jade);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--jade);
            color: white;
            border-color: var(--jade);
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        .result-container {
            text-align: center;
        }

        .result-score {
            font-size: 4em;
            color: var(--jade);
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px var(--jade-glow);
        }

        .result-percentage {
            font-size: 2em;
            color: var(--white);
            margin-bottom: 30px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--jade-pale);
            border-top: 3px solid var(--jade);
            border-radius: 50%;

        async function loadLeaderboard() {
            try {
                const usersSnapshot = await db.collection('users').get();
                const leaderboardData = [];

                usersSnapshot.forEach(doc => {
                    const userData = doc.data();
                    if (userData.challengeHistory && userData.challengeHistory.length > 0) {
                        // Lấy điểm cao nhất của mỗi người
                        const bestScore = Math.max(...userData.challengeHistory.map(item => item.score || 0));
                        leaderboardData.push({
                            uid: doc.id,
                            name: userData.displayName || userData.email || 'Người dùng',
                            email: userData.email,
                            bestScore: bestScore,
                            totalQuestions: 10
                        });
                    }
                });

                // Sắp xếp theo điểm cao nhất giảm dần
                leaderboardData.sort((a, b) => b.bestScore - a.bestScore);
                
                // Lấy top 10
                const topUsers = leaderboardData.slice(0, 10);

                displayLeaderboard(topUsers);
            } catch (error) {
                console.error('Lỗi khi load leaderboard:', error);
            }
        }

                    <div class="menu-buttons">

                    <div class="history-section" id="historySection">

                    </div>
                </div>
            `;

            if (currentUser) {
                loadHistory();
            }
        }

        // Hàm format feedback từ AI
        function formatAIFeedback(text) {
            if (!text || typeof text !== 'string') return '';

            try {
                let formatted = text
                    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/### (.*?)(?:\n|$)/g, '<h3>$1</h3>')
                    .replace(/## (.*?)(?:\n|$)/g, '<h2>$1</h2>')
                    .replace(/# (.*?)(?:\n|$)/g, '<h1>$1</h1>')
                    .replace(/`/g, '')
                    .replace(/~~/g, '')
                    .replace(/^[-*] (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">•</span>$1</span>')
                    .replace(/^\d+\. (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">$&</span></span>')
                    .replace(/^---+$/gm, '<hr style="border: 1px solid var(--jade); margin: 15px 0;">');

                formatted = formatted.replace(/\n\n/g, '<br><br>')
                                   .replace(/\n/g, '<br>');

                return formatted;
            } catch (error) {
                console.error('Lỗi format feedback:', error);
                return text;
            }
        }

        async function loadHistory() {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const challengeHistory = userData.challengeHistory || [];

                    const historySection = document.getElementById('historySection');

                    if (challengeHistory.length === 0) {
                        historySection.innerHTML = '<div class="no-history"><i class="fas fa-history" style="font-size: 3em; margin-bottom: 15px; opacity: 0.5;"></i><p>Chưa có lịch sử thử thách</p></div>';
                        return;
                    }

                    historySection.innerHTML = challengeHistory.reverse().map((item, index) => `
                        <div class="history-card">
                            <div class="history-header" onclick="toggleFeedback(${index})">
                                <span class="history-date">
                                    <i class="far fa-calendar-alt"></i> 
                                    ${new Date(item.date).toLocaleDateString('vi-VN')}
                                </span>
                                <span class="history-score">
                                    <i class="fas fa-star"></i> ${item.score}/${item.totalQuestions}

                                <p><i class="fas fa-percent" style="color: var(--jade);"></i> Tỷ lệ: ${item.percentage}%</p>

                                <div class="history-feedback" id="feedback-${index}">

                                        ${formatAIFeedback(item.aiFeedback)}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Lỗi khi load lịch sử:', error);
            }
        }

        function toggleFeedback(index) {
            const feedback = document.getElementById(`feedback-${index}`);
            const icon = document.getElementById(`expand-icon-${index}`);
            
            if (feedback) {
                feedback.classList.toggle('show');
                icon.classList.toggle('rotated');
            }
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            section.classList.toggle('show');
        }

        function startQuiz() {
            // Lấy ngẫu nhiên 10 câu hỏi
            questions = [...challengeQuestions].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            quizCompleted = false;
            displayQuiz();
        }

        function displayQuiz() {
            const question = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];

            const optionsHtml = question.options.map((option, index) => `
                <div class="option ${selectedAnswer === index ? 'selected' : ''}" onclick="selectAnswer(${index})">
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                </div>
            `).join('');

            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="question-header">
                        <span class="question-number"><i class="fas fa-question-circle"></i> Câu ${currentQuestionIndex + 1}/${questions.length}</span>
                        <div class="question-text">${question.question}</div>
                    </div>

                    <div class="options">
                        ${optionsHtml}
                    </div>

                    <div class="navigation-buttons">
                        <button class="nav-btn" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-left"></i> Câu trước
                        </button>
                        <button class="nav-btn" onclick="nextQuestion()" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>
                            Câu sau <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    ${currentQuestionIndex === questions.length - 1 ?
                    '<button class="submit-btn" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> Nộp bài</button>' : ''}
                </div>
            `;
        }

        function selectAnswer(index) {
            if (quizCompleted) return;
            userAnswers[currentQuestionIndex] = index;
            
            // Cập nhật UI trực tiếp không cần reload
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                if (i === index) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuiz();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuiz();
            }
        }

        function calculateFinalScore() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }
            return score;
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`Bạn còn ${unanswered} câu chưa trả lời!`);
                return;
            }

            quizCompleted = true;

            const totalScore = calculateFinalScore();
            const percentage = Math.round((totalScore / questions.length) * 100);

            // Hiển thị loading
            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p style="color: var(--white); font-size: 1.2em;">AI đang phân tích kết quả của bạn...</p>
                    </div>
                </div>
            `;

            try {
                const aiFeedback = await getAIFeedback(totalScore, percentage);
                if (currentUser) {
                    await saveResult(totalScore, percentage, aiFeedback);
                    // Reload leaderboard sau khi lưu kết quả
                    setTimeout(() => {
                        loadLeaderboard();
                    }, 500);
                }
                displayResult(totalScore, percentage, aiFeedback);
            } catch (error) {
                console.error('Lỗi khi gọi AI:', error);
                displayResult(totalScore, percentage, 'Không thể lấy nhận xét từ AI. Vui lòng thử lại sau.');
            }
        }

        async function getAIFeedback(score, percentage) {
            const wrongAnswers = [];
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== questions[i].correct) {
                    wrongAnswers.push({
                        question: questions[i].question,
                        userAnswer: questions[i].options[userAnswers[i]],
                        correctAnswer: questions[i].options[questions[i].correct]
                    });
                }
            }

            const prompt = `Bạn là chuyên gia về văn hóa Việt Nam. Hãy phân tích kết quả bài kiểm tra:

Số câu đúng: ${score}/${questions.length} (${percentage}%)

Các câu sai:
${wrongAnswers.map((w, i) => `${i + 1}. "${w.question}" - Chọn: "${w.userAnswer}" - Đúng: "${w.correctAnswer}"`).join('\n')}

Hãy đưa ra nhận xét NGẮN GỌN (khoảng 50 từ) về:
1. Điểm mạnh

        async function saveResult(score, percentage, feedback) {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.exists ? userDoc.data() : {};
                
                // Cập nhật displayName nếu có
                if (!userData.displayName && currentUser.displayName) {
                    userData.displayName = currentUser.displayName;
                }
                if (!userData.email && currentUser.email) {
                    userData.email = currentUser.email;
                }
                
                const challengeHistory = userData.challengeHistory || [];

                challengeHistory.push({
                    date: new Date().toISOString(),
                    score: score,
                    totalQuestions: questions.length,
                    percentage: percentage,
                    aiFeedback: feedback
                });

                await db.collection('users').doc(currentUser.uid).set({
                    ...userData,
                    displayName: currentUser.displayName || userData.displayName,
                    email: currentUser.email || userData.email,
                    challengeHistory: challengeHistory
                });
            } catch (error) {
                console.error('Lỗi khi lưu kết quả:', error);
            }
        }

        function displayResult(score, percentage, feedback) {
            // Format feedback để xử lý markdown và giữ xuống dòng
            const formattedFeedback = formatAIFeedback(feedback);
            
            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container result-container">
                    <i class="fas fa-trophy" style="font-size: 4em; color: var(--jade); margin-bottom: 20px;"></i>
                    
                    <div class="result-score">
                        ${score}/${questions.length}
                    </div>
                    
                    <div class="result-percentage">
                        ${percentage}% hiểu biết văn hóa
                    </div>
                    
                    <div class="ai-feedback">
                        <h3><i class="fas fa-robot"></i> Nhận xét từ Sao Vàng</h3>
                        <div class="ai-feedback-content">
                            ${formattedFeedback}
                        </div>
                    </div>
                    
                    <button class="back-btn" onclick="location.reload()">
                        <i class="fas fa-arrow-left"></i> Quay lại menu
                    </button>
                </div>
            `;
        }
