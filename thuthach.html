<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Thử thách kiến thức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 0;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo img {
            height: 45px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .logo span {
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-links a:hover {
            background: #ffd700;
            color: #370100;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .nav-links a.active {
            background: #ffd700;
            color: #370100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .user-info i {
            color: #ffd700;
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            color: #ffd700;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .menu-container {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .menu-header i {
            font-size: 4em;
            color: #ffd700;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .menu-header h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .menu-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1em;
        }

        .menu-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 50px;
        }

        .menu-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-btn i {
            font-size: 1.2em;
        }

        .menu-btn.start-btn {
            background: #ffd700;
            color: #370100;
        }

        .menu-btn.start-btn:hover {
            background: #ffed4a;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .menu-btn.history-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        .history-section.show {
            max-height: 2000px;
        }

        .history-card {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .history-date {
            color: #ffd700;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-score {
            background: rgba(255, 215, 0, 0.2);
            padding: 5px 15px;
            border-radius: 30px;
            color: #ffd700;
            font-weight: bold;
        }

        .history-details {
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .history-feedback {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 0;
            padding: 0 15px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 15px;
            border-left: 4px solid #ffd700;
            font-style: italic;
        }

        .history-feedback.show {
            max-height: 500px;
            margin-top: 15px;
            padding: 15px;
        }

        .history-feedback-content {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
        }

        .history-feedback-content p {
            margin-bottom: 10px;
        }

        .history-feedback-content ul, 
        .history-feedback-content ol {
            margin-left: 20px;
            margin-bottom: 10px;
        }

        .no-history {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 40px;
            font-size: 1.1em;
        }

        .expand-icon {
            color: #ffd700;
            transition: transform 0.3s ease;
        }

        .expand-icon.rotated {
            transform: rotate(90deg);
        }

        .quiz-container {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeIn 0.5s ease;
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .question-number {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1em;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            white-space: nowrap;
        }

        .question-text {
            font-size: 1.4em;
            color: white;
            line-height: 1.6;
            font-weight: 500;
            flex: 1;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: rgba(255, 255, 255, 0.9);
        }

        .option:hover {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(255, 215, 0, 0.3);
            transform: translateX(5px);
        }

        .option.selected {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .option-letter {
            width: 35px;
            height: 35px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ffd700;
            color: #ffd700;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 60px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #ffd700;
            color: #370100;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background: #ffed4a;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
        }

        .result-container {
            text-align: center;
        }

        .result-score {
            font-size: 4em;
            color: #ffd700;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .result-percentage {
            font-size: 2em;
            color: white;
            margin-bottom: 30px;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 215, 0, 0.3);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ai-feedback {
            background: rgba(255, 215, 0, 0.1);
            border-left: 4px solid #ffd700;
            padding: 25px;
            border-radius: 15px;
            text-align: left;
            margin: 30px 0;
        }

        .ai-feedback h3 {
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .ai-feedback p {
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .back-btn {
            padding: 12px 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 60px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }
    </style>
</head>

        <div class="nav-links">

    <div class="container" id="mainContainer">
        <!-- Nội dung sẽ được load bằng JavaScript -->
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyCznQ023bnCgA6QLl2M-0J5X3pslRiQwa0",
            authDomain: "kehoachso.firebaseapp.com",
            projectId: "kehoachso",
            storageBucket: "kehoachso.firebasestorage.app",
            messagingSenderId: "80210804205",
            appId: "1:80210804205:web:be0d3b3e68bae6867dfbe4",
            measurementId: "G-C6YGPPG13R"
        };

        // Gemini API key
        const REVERSED_GEMINI_KEY = 'gVH30eaBb4DV1utfJ94m0GVymawfG5QlCySazIA';
        function reverseString(str) {
            return str.split('').reverse().join('');
        }
        const GEMINI_KEY = reverseString(REVERSED_GEMINI_KEY);
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${GEMINI_KEY}`;

        // Khởi tạo Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let questions = [];
        let currentQuestionIndex = 0;
        let userAnswers = [];
        let quizCompleted = false;

        const questionsData = [
            {
                question: "Vua Hùng đầu tiên của nước Văn Lang là ai?",
                options: ["Hùng Vương thứ I", "Hùng Vương thứ VI", "Hùng Vương thứ XVIII", "Hùng Vương thứ X"],
                correct: 0
            },
            {
                question: "Chiến thắng Bạch Đằng năm 938 do ai lãnh đạo?",
                options: ["Ngô Quyền", "Trần Hưng Đạo", "Lý Thường Kiệt", "Quang Trung"],
                correct: 0
            },
            {
                question: "Áo dài truyền thống của Việt Nam có nguồn gốc từ đâu?",

            },
            {
                question: "Tết Nguyên Đán còn được gọi là gì?",
                options: ["Tết Cả", "Tết Ta", "Tết cổ truyền", "Tất cả đều đúng"],
                correct: 3
            },
            {
                question: "Văn Miếu - Quốc Tử Giám được xây dựng vào năm nào?",
                options: ["1010", "1070", "1076", "1484"],
                correct: 1
            },
            {
                question: "Trần Hưng Đạo nổi tiếng với chiến thắng nào?",
                options: ["Bạch Đằng 938", "Như Nguyệt", "Bạch Đằng 1288", "Chi Lăng"],
                correct: 2
            },
            {
                question: "Bánh chưng gắn liền với truyền thuyết về ai?",
                options: ["Lang Liêu", "Sơn Tinh", "Thánh Gióng", "Mỵ Châu"],
                correct: 0
            },
            {
                question: "Chiến dịch Điện Biên Phủ diễn ra vào năm nào?",
                options: ["1945", "1954", "1975", "1930"],
                correct: 1
            },
            {
                question: "Ca trù là loại hình nghệ thuật của vùng nào?",
                options: ["Bắc Bộ", "Trung Bộ", "Nam Bộ", "Tây Nguyên"],
                correct: 0
            },
            {
                question: "Quốc hiệu đầu tiên của Việt Nam là gì?",
                options: ["Văn Lang", "Âu Lạc", "Đại Việt", "Việt Nam"],
                correct: 0
            },
            {
                question: "Chùa Hương thuộc tỉnh nào?",
                options: ["Hà Nội", "Hà Nam", "Ninh Bình", "Hòa Bình"],
                correct: 0
            },
            {
                question: "Lý Thái Tổ dời đô từ Hoa Lư về Thăng Long năm nào?",
                options: ["1009", "1010", "1011", "1012"],
                correct: 1
            },
            {
                question: "Múa rối nước có nguồn gốc từ vùng nào?",
                options: ["Đồng bằng sông Hồng", "Đồng bằng sông Cửu Long", "Miền Trung", "Miền núi phía Bắc"],
                correct: 0
            },
            {
                question: "Trống đồng Đông Sơn thuộc thời kỳ nào?",
                options: ["Văn Lang - Âu Lạc", "Bắc thuộc", "Nhà Lý", "Nhà Trần"],
                correct: 0
            },
            {
                question: "Tết Trung Thu còn được gọi là gì?",
                options: ["Tết Thiếu nhi", "Tết Đoàn viên", "Tết Trông trăng", "Tất cả đều đúng"],
                correct: 3
            }
        ];

        // Kiểm tra đăng nhập
        auth.onAuthStateChanged((user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            document.getElementById('userName').textContent = user.displayName || 'Người dùng';
            currentUser = user;
            showMainMenu();
        });

        function logout() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            });
        }

        function showMainMenu() {
            document.getElementById('mainContainer').innerHTML = `
                <div class="menu-container">
                    <div class="menu-header">
                        <i class="fas fa-trophy"></i>
                        <h1>Thử thách kiến thức</h1>
                        <p>Kiểm tra hiểu biết của bạn về văn hóa Việt Nam</p>
                    </div>
                    
                    <div class="menu-buttons">
                        <button class="menu-btn start-btn" onclick="startQuiz()">
                            <i class="fas fa-play"></i> Bắt đầu
                        </button>
                        <button class="menu-btn history-btn" onclick="toggleHistory()">
                            <i class="fas fa-history"></i> Lịch sử
                        </button>
                    </div>

                    <div class="history-section" id="historySection">
                        <!-- Lịch sử sẽ được load ở đây -->
                    </div>
                </div>
            `;

            loadHistory();
        }

        async function loadHistory() {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                if (userDoc.exists) {
                    const userData = userDoc.data();
                    const challengeHistory = userData.challengeHistory || [];
                    
                    const historySection = document.getElementById('historySection');
                    
                    if (challengeHistory.length === 0) {
                        historySection.innerHTML = '<div class="no-history"><i class="fas fa-history" style="font-size: 3em; margin-bottom: 15px; opacity: 0.5;"></i><p>Chưa có lịch sử thử thách</p></div>';
                        return;
                    }

                    historySection.innerHTML = challengeHistory.reverse().map((item, index) => `
                        <div class="history-card">
                            <div class="history-header" onclick="toggleFeedback(${index})">
                                <span class="history-date">
                                    <i class="far fa-calendar-alt"></i> 
                                    ${new Date(item.date).toLocaleDateString('vi-VN')}
                                </span>
                                <span class="history-score">
                                    <i class="fas fa-star"></i> ${item.score}/${item.totalQuestions}
                                </span>
                                <i class="fas fa-chevron-right expand-icon" id="expand-icon-${index}"></i>
                            </div>
                            <div class="history-details">
                                <p><i class="fas fa-percent" style="color: #ffd700;"></i> Tỷ lệ: ${item.percentage}%</p>
                            </div>
                            ${item.aiFeedback ? `
                                <div class="history-feedback" id="feedback-${index}">
                                    <div class="history-feedback-content">
                                        ${formatAIFeedback(item.aiFeedback)}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    `).join('');
                }
            } catch (error) {
                console.error('Lỗi khi load lịch sử:', error);
            }
        }

        function formatAIFeedback(text) {
            if (!text) return '';
            
            // Xử lý markdown cơ bản
            let formatted = text
                .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/### (.*?)(?:\n|$)/g, '<h3>$1</h3>')
                .replace(/## (.*?)(?:\n|$)/g, '<h2>$1</h2>')
                .replace(/# (.*?)(?:\n|$)/g, '<h1>$1</h1>')
                .replace(/\n/g, '<br>');
            
            return formatted;
        }

        function toggleFeedback(index) {
            const feedback = document.getElementById(`feedback-${index}`);
            const icon = document.getElementById(`expand-icon-${index}`);
            
            if (feedback) {
                feedback.classList.toggle('show');
                icon.classList.toggle('rotated');
            }
        }

        function toggleHistory() {
            const section = document.getElementById('historySection');
            section.classList.toggle('show');
        }

        function startQuiz() {
            // Lấy ngẫu nhiên 10 câu hỏi
            questions = [...questionsData].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            quizCompleted = false;
            displayQuiz();
        }

        function displayQuiz() {
            const question = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];

            const optionsHtml = question.options.map((option, index) => `
                <div class="option ${selectedAnswer === index ? 'selected' : ''}" onclick="selectAnswer(${index})">
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                </div>
            `).join('');

            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="question-header">
                        <span class="question-number"><i class="fas fa-question-circle"></i> Câu ${currentQuestionIndex + 1}/${questions.length}</span>
                        <div class="question-text">${question.question}</div>
                    </div>

                    <div class="options">
                        ${optionsHtml}
                    </div>

                    <div class="navigation-buttons">
                        <button class="nav-btn" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-left"></i> Câu trước
                        </button>
                        <button class="nav-btn" onclick="nextQuestion()" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>
                            Câu sau <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    ${currentQuestionIndex === questions.length - 1 ? 
                        '<button class="submit-btn" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> Nộp bài</button>' : ''}
                </div>
            `;
        }

        function selectAnswer(index) {
            if (quizCompleted) return;
            userAnswers[currentQuestionIndex] = index;
            
            // Cập nhật UI trực tiếp không cần reload
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                if (i === index) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuiz();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuiz();
            }
        }

        function calculateFinalScore() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }
            return score;
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`Bạn còn ${unanswered} câu chưa trả lời!`);
                return;
            }

            quizCompleted = true;
            
            const totalScore = calculateFinalScore();
            const percentage = Math.round((totalScore / questions.length) * 100);
            
            // Hiển thị loading
            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p style="color: white; font-size: 1.2em;">AI đang phân tích kết quả của bạn...</p>
                    </div>
                </div>
            `;

            try {
                const aiFeedback = await getAIFeedback(totalScore, percentage);
                await saveResult(totalScore, percentage, aiFeedback);
                displayResult(totalScore, percentage, aiFeedback);
            } catch (error) {
                console.error('Lỗi khi gọi AI:', error);
                displayResult(totalScore, percentage, 'Không thể lấy nhận xét từ AI. Vui lòng thử lại sau.');
            }
        }

        async function getAIFeedback(score, percentage) {
            const wrongAnswers = [];
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== questions[i].correct) {
                    wrongAnswers.push({
                        question: questions[i].question,
                        userAnswer: questions[i].options[userAnswers[i]],
                        correctAnswer: questions[i].options[questions[i].correct]
                    });
                }
            }

            const prompt = `Bạn là chuyên gia về văn hóa Việt Nam. Hãy phân tích kết quả bài kiểm tra:

Số câu đúng: ${score}/${questions.length} (${percentage}%)

Các câu sai:
${wrongAnswers.map((w, i) => `${i+1}. Câu: "${w.question}"\n   Đáp án chọn: "${w.userAnswer}"\n   Đáp án đúng: "${w.correctAnswer}"`).join('\n\n')}

Hãy đưa ra nhận xét ngắn gọn (khoảng 50 từ) về:
1. Điểm mạnh
2. Các chủ đề cần cải thiện
3. Lời khuyên cụ thể

Trả lời bằng tiếng Việt, thân thiện, khích lệ. KHÔNG sử dụng markdown, chỉ dùng văn bản thuần túy.`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) throw new Error('Lỗi API');
            
            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function saveResult(score, percentage, feedback) {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.exists ? userDoc.data() : {};
                const challengeHistory = userData.challengeHistory || [];
                
                challengeHistory.push({
                    date: new Date().toISOString(),
                    score: score,
                    totalQuestions: questions.length,
                    percentage: percentage,
                    aiFeedback: feedback
                });

                await db.collection('users').doc(currentUser.uid).set({
                    ...userData,
                    challengeHistory: challengeHistory
                });
            } catch (error) {
                console.error('Lỗi khi lưu kết quả:', error);
            }
        }

        function displayResult(score, percentage, feedback) {
            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container result-container">
                    <i class="fas fa-trophy" style="font-size: 4em; color: #ffd700; margin-bottom: 20px;"></i>
                    
                    <div class="result-score">
                        ${score}/${questions.length}
                    </div>
                    
                    <div class="result-percentage">
                        ${percentage}% hiểu biết văn hóa
                    </div>
                    
                    <div class="ai-feedback">
                        <h3><i class="fas fa-robot"></i> Nhận xét từ AI</h3>
                        <p>${feedback}</p>
                    </div>
                    
                    <button class="back-btn" onclick="showMainMenu()">
                        <i class="fas fa-arrow-left"></i> Quay lại menu
                    </button>
                </div>
            `;
        }
    </script>
</body>
</html>
