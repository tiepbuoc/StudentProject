<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIETVERSE - Thử thách kiến thức</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,700;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ink: #fff9f0;
            --ink2: #ffefe0;
            --ink3: #ffe6d1;
            --jade: #ff8c42;
            --jade2: #ff6b2b;
            --jade-glow: rgba(255, 140, 66, 0.18);
            --jade-pale: rgba(255, 140, 66, 0.08);
            --gold: #ffb347;
            --gold-pale: rgba(255, 179, 71, 0.12);
            --white: #2c1810;
            --fog: rgba(44, 24, 16, 0.55);
            --mist: rgba(44, 24, 16, 0.08);
            --border: rgba(255, 140, 66, 0.18);
            --text-dim: rgba(44, 24, 16, 0.65);
            --text-mid: rgba(44, 24, 16, 0.72);
            
            /* Màu sắc cho các miền */
            --north: #3498db;
            --north-glow: rgba(52, 152, 219, 0.2);
            --central: #e67e22;
            --central-glow: rgba(230, 126, 52, 0.2);
            --south: #e74c3c;
            --south-glow: rgba(231, 76, 60, 0.2);
            --west: #27ae60;
            --west-glow: rgba(39, 174, 96, 0.2);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #fff9f0 0%, #ffe6d1 100%);
            min-height: 100vh;
            position: relative;
            color: var(--white);
        }

        /* Grain effect */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: .035;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px;
            animation: grainAnim 8s steps(10) infinite;
        }

        @keyframes grainAnim {
            0%,100% { transform: translate(0,0); }
            10% { transform: translate(-2%,-3%); }
            20% { transform: translate(3%,2%); }
            30% { transform: translate(-1%,4%); }
            40% { transform: translate(4%,-1%); }
            50% { transform: translate(-3%,3%); }
            60% { transform: translate(2%,-4%); }
            70% { transform: translate(-4%,1%); }
            80% { transform: translate(1%,3%); }
            90% { transform: translate(3%,-2%); }
        }

        /* Ambient lights */
        .ambient {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
        }
        .amb1 {
            top: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, var(--jade-glow) 0%, transparent 70%);
            animation: ambFloat 12s ease-in-out infinite;
        }
        .amb2 {
            bottom: -200px;
            left: -150px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--gold-pale) 0%, transparent 70%);
            animation: ambFloat 16s ease-in-out infinite reverse;
        }
        .amb3 {
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, var(--jade-pale) 0%, transparent 65%);
        }

        @keyframes ambFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(30px,-30px) scale(1.05); }
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            padding: 0 1%;
            height: 72px;
            background: rgba(255, 249, 240, 0.8);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border-bottom: 1px solid var(--border);
            transition: all .3s;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo img {
            height: 38px;
            width: auto;
            filter: drop-shadow(0 4px 6px var(--jade-glow));
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .right-section {
            display: flex;
            align-items: center;
        }

        .nav-links a {
            color: var(--white);
            text-decoration: none;
            font-size: 16px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            background: var(--jade-pale);
            border: 1px solid var(--border);
        }

        .nav-links a:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px var(--jade-glow);
        }

        .nav-links a.active {
            background: var(--jade);
            color: white;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--white);
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 50px;
            border: 1px solid var(--border);
        }

        .user-info i {
            color: var(--jade);
            font-size: 18px;
        }

        .user-info span {
            font-weight: 500;
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .logout-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .login-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--white);
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .login-btn:hover {
            background: var(--jade-pale);
            border-color: var(--jade);
            color: var(--jade);
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 100px auto 40px;
            padding: 0 20px;
        }

        /* Menu Container */
        .menu-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .menu-container::before {
            content: '';
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--jade-pale) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .menu-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .menu-header i {
            font-size: 4em;
            color: var(--jade);
            margin-bottom: 20px;
            text-shadow: 0 0 30px var(--jade-glow);
        }

        .menu-header h1 {
            color: var(--jade2);
            font-size: 2.5em;
            margin-bottom: 10px;
            font-family: 'Fraunces', serif;
        }

        .menu-header p {
            color: var(--text-mid);
            font-size: 1.1em;
        }

        /* Region Selection */
        .region-selection {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 30px 0;
        }

        .region-card {
            background: var(--jade-pale);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .region-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.1) 100%);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .region-card:hover::before {
            opacity: 1;
        }

        .region-card.north {
            border-color: var(--north);
            box-shadow: 0 10px 30px var(--north-glow);
        }
        .region-card.north i { color: var(--north); }

        .region-card.central {
            border-color: var(--central);
            box-shadow: 0 10px 30px var(--central-glow);
        }
        .region-card.central i { color: var(--central); }

        .region-card.south {
            border-color: var(--south);
            box-shadow: 0 10px 30px var(--south-glow);
        }
        .region-card.south i { color: var(--south); }

        .region-card.west {
            border-color: var(--west);
            box-shadow: 0 10px 30px var(--west-glow);
        }
        .region-card.west i { color: var(--west); }

        .region-card i {
            font-size: 3em;
            margin-bottom: 15px;
        }

        .region-card h3 {
            font-size: 1.5em;
            margin-bottom: 10px;
            color: var(--white);
        }

        .region-card p {
            color: var(--text-dim);
            font-size: 0.95em;
        }

        .menu-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        .menu-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--jade-pale);
            color: var(--white);
            border: 1px solid var(--border);
            box-shadow: 0 4px 15px var(--jade-glow);
        }

        .menu-btn i {
            font-size: 1.2em;
        }

        .menu-btn.start-btn {
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
        }

        .menu-btn.start-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-5px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        .menu-btn.history-btn:hover {
            background: var(--jade);
            color: white;
            transform: translateY(-5px);
            border-color: var(--jade);
        }

        .history-section {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            margin-top: 30px;
        }

        .history-section.show {
            max-height: 2000px;
        }

        .history-card {
            background: linear-gradient(135deg, rgba(255, 249, 240, 0.9) 0%, rgba(255, 239, 224, 0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 1px solid var(--jade);
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .history-date {
            color: var(--jade);
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-score {
            background: var(--jade-pale);
            padding: 5px 15px;
            border-radius: 30px;
            color: var(--jade2);
            font-weight: bold;
        }

        .history-details {
            color: var(--text-mid);
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .history-feedback {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
            margin-top: 0;
            padding: 0 15px;
            background: var(--jade-pale);
            border-radius: 10px;
            border-left: 4px solid var(--jade);
        }

        .history-feedback.show {
            max-height: 500px;
            margin-top: 15px;
            padding: 15px;
        }

        .history-feedback-content {
            color: var(--white);
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .no-history {
            text-align: center;
            color: var(--text-dim);
            padding: 40px;
            font-size: 1.1em;
        }

        .expand-icon {
            color: var(--jade);
            transition: transform 0.3s ease;
        }

        .expand-icon.rotated {
            transform: rotate(90deg);
        }

        /* Quiz Container */
        .quiz-container {
            background: rgba(255, 249, 240, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px var(--jade-glow);
            animation: fadeIn 0.5s ease;
            margin-bottom: 30px;
        }

        .question-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .question-number {
            color: var(--jade);
            font-weight: bold;
            font-size: 1.1em;
            background: var(--jade-pale);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--jade);
            white-space: nowrap;
        }

        .region-badge {
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1em;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .region-badge.north {
            background: rgba(52, 152, 219, 0.2);
            border: 1px solid var(--north);
            color: var(--north);
        }
        .region-badge.central {
            background: rgba(230, 126, 52, 0.2);
            border: 1px solid var(--central);
            color: var(--central);
        }
        .region-badge.south {
            background: rgba(231, 76, 60, 0.2);
            border: 1px solid var(--south);
            color: var(--south);
        }
        .region-badge.west {
            background: rgba(39, 174, 96, 0.2);
            border: 1px solid var(--west);
            color: var(--west);
        }

        .question-text {
            font-size: 1.4em;
            color: var(--white);
            line-height: 1.6;
            font-weight: 500;
            flex: 1;
            min-width: 100%;
            margin-top: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .option {
            display: flex;
            align-items: center;
            padding: 18px 25px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            color: var(--white);
        }

        .option:hover {
            background: rgba(255, 140, 66, 0.15);
            border-color: var(--jade);
            transform: translateX(5px);
        }

        .option.selected {
            background: var(--jade-pale);
            border-color: var(--jade);
            border-width: 2px;
        }

        .option-letter {
            width: 35px;
            height: 35px;
            background: var(--jade-pale);
            border: 1px solid var(--jade);
            color: var(--jade);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }

        .nav-btn {
            padding: 12px 30px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: var(--jade);
            color: white;
            border-color: var(--jade);
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--jade), var(--gold));
            color: white;
            border: none;
            border-radius: 60px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .submit-btn:hover {
            background: linear-gradient(135deg, var(--jade2), var(--jade));
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--jade-glow);
        }

        .result-container {
            text-align: center;
        }

        .result-score {
            font-size: 4em;
            color: var(--jade);
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 0 30px var(--jade-glow);
        }

        .result-percentage {
            font-size: 2em;
            color: var(--white);
            margin-bottom: 30px;
        }

        .result-time {
            font-size: 1.3em;
            color: var(--jade);
            margin-bottom: 30px;
            background: var(--jade-pale);
            padding: 15px 30px;
            border-radius: 60px;
            display: inline-block;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--jade-pale);
            border-top: 3px solid var(--jade);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .ai-feedback {
            background: linear-gradient(135deg, var(--jade-pale) 0%, rgba(255, 249, 240, 0.9) 100%);
            border: 1px solid var(--jade);
            box-shadow: 0 5px 15px var(--jade-glow);
            padding: 25px;
            border-radius: 15px;
            text-align: left;
            margin: 30px 0;
        }

        .ai-feedback h3 {
            color: var(--jade);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3em;
        }

        .ai-feedback-content {
            color: var(--white);
            line-height: 1.6;
            font-size: 1.1em;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .ai-feedback-content strong {
            color: var(--jade2);
        }

        .ai-feedback-content em {
            color: var(--jade);
            font-style: italic;
        }

        .back-btn {
            padding: 15px 40px;
            background: var(--jade-pale);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 60px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
        }

        .back-btn:hover {
            background: var(--jade);
            color: white;
            border-color: var(--jade);
        }

        /* Certificate Modal */
        .certificate-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .certificate-modal.active {
            display: flex;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .certificate-content {
            background: rgba(255, 249, 240, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            width: 90%;
            max-width: 500px;
            border: 2px solid var(--jade);
            box-shadow: 0 20px 40px var(--jade-glow);
            text-align: center;
        }

        .certificate-content h2 {
            color: var(--jade);
            font-size: 2em;
            margin-bottom: 20px;
        }

        .certificate-content p {
            color: var(--text-mid);
            margin-bottom: 25px;
            font-size: 1.1em;
        }

        .certificate-content input {
            width: 100%;
            padding: 15px 20px;
            border: 1px solid var(--border);
            border-radius: 60px;
            font-size: 1.1em;
            margin-bottom: 20px;
            background: var(--jade-pale);
            color: var(--white);
        }

        .certificate-content input:focus {
            outline: none;
            border-color: var(--jade);
            box-shadow: 0 0 15px var(--jade-glow);
        }

        .certificate-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .cert-btn {
            padding: 12px 30px;
            border: none;
            border-radius: 60px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        async function loadQuestions() {
            try {
                const settingsDoc = await db.collection('settings').doc('challengeQuestions').get();
                if (settingsDoc.exists) {
                    allQuestions = settingsDoc.data() || {
                        north: [],
                        central: [],
                        south: [],
                        west: []
                    };
                    
                    // Kiểm tra mỗi miền có ít nhất 10 câu hỏi
                    const regions = ['north', 'central', 'south', 'west'];
                    let needUpdate = false;
                    
                    regions.forEach(region => {
                        if (!allQuestions[region] || allQuestions[region].length < 10) {
                            needUpdate = true;
                        }
                    });
                    
                    if (needUpdate) {
                        // Thêm câu hỏi mặc định nếu thiếu
                        const defaultQuestions = getDefaultQuestions();
                        regions.forEach(region => {
                            if (!allQuestions[region]) allQuestions[region] = [];
                            while (allQuestions[region].length < 10) {
                                const defaultQ = defaultQuestions[region][allQuestions[region].length % defaultQuestions[region].length];
                                allQuestions[region].push({...defaultQ});
                            }
                        });
                        
                        await db.collection('settings').doc('challengeQuestions').set(allQuestions);

                } else {
                    // Tạo câu hỏi mặc định

        // Hàm format feedback từ AI
        function formatAIFeedback(text) {
            if (!text || typeof text !== 'string') return '';

            try {
                let formatted = text
                    .replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>')
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/### (.*?)(?:\n|$)/g, '<h3>$1</h3>')
                    .replace(/## (.*?)(?:\n|$)/g, '<h2>$1</h2>')
                    .replace(/# (.*?)(?:\n|$)/g, '<h1>$1</h1>')
                    .replace(/`/g, '')
                    .replace(/~~/g, '')
                    .replace(/^[-*] (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">•</span>$1</span>')
                    .replace(/^\d+\. (.*?)(?:\n|$)/gm, '<span style="display: block; margin: 5px 0;"><span style="color: var(--jade); margin-right: 8px;">$&</span></span>')
                    .replace(/^---+$/gm, '<hr style="border: 1px solid var(--jade); margin: 15px 0;">');

                formatted = formatted.replace(/\n\n/g, '<br><br>')
                                   .replace(/\n/g, '<br>');

                return formatted;
            } catch (error) {
                console.error('Lỗi format feedback:', error);
                return text;
            }
        }

        function startQuiz() {
            // Lấy 10 câu hỏi từ miền đã chọn
            questions = [...allQuestions[currentRegion.key]].sort(() => 0.5 - Math.random()).slice(0, 10);
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            quizCompleted = false;
            startTime = new Date(); // Bắt đầu tính thời gian
            displayQuiz();
        }

        function displayQuiz() {
            const question = questions[currentQuestionIndex];
            const selectedAnswer = userAnswers[currentQuestionIndex];

            // Xác định class cho region badge
            let regionClass = '';
            if (currentRegion.key === 'north') regionClass = 'north';
            else if (currentRegion.key === 'central') regionClass = 'central';
            else if (currentRegion.key === 'south') regionClass = 'south';
            else if (currentRegion.key === 'west') regionClass = 'west';

            const optionsHtml = question.options.map((option, index) => `
                <div class="option ${selectedAnswer === index ? 'selected' : ''}" onclick="selectAnswer(${index})">
                    <div class="option-letter">${String.fromCharCode(65 + index)}</div>
                    <div class="option-text">${option}</div>
                </div>
            `).join('');

            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="question-header">
                        <span class="question-number"><i class="fas fa-question-circle"></i> Câu ${currentQuestionIndex + 1}/${questions.length}</span>
                        <span class="region-badge ${regionClass}"><i class="fas fa-map-marker-alt"></i> ${currentRegion.name}</span>
                        <div class="question-text">${question.question}</div>
                    </div>

                    <div class="options">
                        ${optionsHtml}
                    </div>

                    <div class="navigation-buttons">
                        <button class="nav-btn" onclick="previousQuestion()" ${currentQuestionIndex === 0 ? 'disabled' : ''}>
                            <i class="fas fa-arrow-left"></i> Câu trước
                        </button>
                        <button class="nav-btn" onclick="nextQuestion()" ${currentQuestionIndex === questions.length - 1 ? 'disabled' : ''}>
                            Câu sau <i class="fas fa-arrow-right"></i>
                        </button>
                    </div>

                    ${currentQuestionIndex === questions.length - 1 ?
                    '<button class="submit-btn" onclick="submitQuiz()"><i class="fas fa-check-circle"></i> Nộp bài</button>' : ''}
                </div>
            `;
            
            // Load bảng xếp hạng bên dưới
            loadRanking();
        }

        function selectAnswer(index) {
            if (quizCompleted) return;
            userAnswers[currentQuestionIndex] = index;
            
            // Cập nhật UI trực tiếp không cần reload
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                if (i === index) {
                    opt.classList.add('selected');
                } else {
                    opt.classList.remove('selected');
                }
            });
        }

        function previousQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                displayQuiz();
            }
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                displayQuiz();
            }
        }

        function calculateFinalScore() {
            let score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === questions[i].correct) {
                    score++;
                }
            }
            return score;
        }

        async function submitQuiz() {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                alert(`Bạn còn ${unanswered} câu chưa trả lời!`);
                return;
            }

            quizCompleted = true;
            endTime = new Date();
            const completionTime = Math.floor((endTime - startTime) / 1000); // Thời gian làm bài (giây)

            const totalScore = calculateFinalScore();
            const percentage = Math.round((totalScore / questions.length) * 100);

            // Hiển thị loading
            document.getElementById('mainContainer').innerHTML = `
                <div class="quiz-container">
                    <div class="loading">
                        <div class="loading-spinner"></div>
                        <p style="color: var(--white); font-size: 1.2em;">AI đang phân tích kết quả của bạn...</p>
                    </div>
                </div>
            `;

            try {
                const aiFeedback = await getAIFeedback(totalScore, percentage);
                if (currentUser) {
                    await saveResult(totalScore, percentage, completionTime, aiFeedback);
                }
                
                // Kiểm tra nếu đạt 10/10 điểm
                if (totalScore === 10) {
                    showCertificateModal();
                } else {
                    displayResult(totalScore, percentage, completionTime, aiFeedback);
                }
            } catch (error) {
                console.error('Lỗi khi gọi AI:', error);
                displayResult(totalScore, percentage, completionTime, 'Không thể lấy nhận xét từ AI. Vui lòng thử lại sau.');
            }
        }

        async function getAIFeedback(score, percentage) {
            const wrongAnswers = [];
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers[i] !== questions[i].correct) {
                    wrongAnswers.push({
                        question: questions[i].question,
                        userAnswer: questions[i].options[userAnswers[i]],
                        correctAnswer: questions[i].options[questions[i].correct]
                    });
                }
            }

            const prompt = `Bạn là chuyên gia về văn hóa Việt Nam. Hãy phân tích kết quả bài kiểm tra về ${currentRegion.name}:

Số câu đúng: ${score}/${questions.length} (${percentage}%)

Các câu sai:
${wrongAnswers.map((w, i) => `${i + 1}. "${w.question}" - Chọn: "${w.userAnswer}" - Đúng: "${w.correctAnswer}"`).join('\n')}

Hãy đưa ra nhận xét NGẮN GỌN (khoảng 50 từ) về:
1. Điểm mạnh
2. Các chủ đề cần cải thiện
3. Lời khuyên cụ thể

Trả lời bằng tiếng Việt, thân thiện, khích lệ. KHÔNG sử dụng markdown phức tạp.`;

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            if (!response.ok) throw new Error('Lỗi API');

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function saveResult(score, percentage, completionTime, feedback) {
            try {
                const userDoc = await db.collection('users').doc(currentUser.uid).get();
                const userData = userDoc.exists ? userDoc.data() : {};
                const challengeHistory = userData.challengeHistory || [];

                challengeHistory.push({
                    date: new Date().toISOString(),
                    region: currentRegion.key,
                    regionName: currentRegion.name,
                    score: score,
                    totalQuestions: questions.length,
                    percentage: percentage,
                    completionTime: completionTime,
                    aiFeedback: feedback
                });

                await db.collection('users').doc(currentUser.uid).set({
                    ...userData,
                    challengeHistory: challengeHistory
                });
                
                // Nếu đạt 10/10, lưu vào bảng xếp hạng
                if (score === 10 && currentUser.displayName) {
                    await saveToRanking(currentUser.displayName, completionTime);
                }
            } catch (error) {
                console.error('Lỗi khi lưu kết quả:', error);
            }
        }

        async function saveToRanking(userName, completionTime) {
            try {
                // Kiểm tra xem user đã có trong bảng xếp hạng chưa
                const rankingRef = db.collection('ranking').doc(currentUser.uid);
                const rankingDoc = await rankingRef.get();
                
                const rankingData = {
                    userId: currentUser.uid,
                    userName: userName,
                    score: 10,
                    completionTime: completionTime,
                    region: currentRegion.key,
                    regionName: currentRegion.name,
                    timestamp: new Date().toISOString()
                };
                
                // Nếu đã có, chỉ cập nhật nếu thời gian làm bài tốt hơn
                if (rankingDoc.exists) {
                    const existingData = rankingDoc.data();
                    if (completionTime < existingData.completionTime) {
                        await rankingRef.set(rankingData);
                    }
                } else {
                    await rankingRef.set(rankingData);
                }
            } catch (error) {
                console.error('Lỗi khi lưu bảng xếp hạng:', error);
            }
        }

        // Hàm tạo giấy chứng nhận
        function generateCertificate() {
            const name = document.getElementById('certificateName').value.trim();
            if (!name) {
                alert('Vui lòng nhập tên của bạn!');
                return;
            }

            // Cập nhật tên hiển thị
            if (currentUser) {
                currentUser.updateProfile({
                    displayName: name
                }).then(async () => {
                    // Lưu vào bảng xếp hạng với tên mới
                    if (endTime && startTime) {
                        const completionTime = Math.floor((endTime - startTime) / 1000);
                        await saveToRanking(name, completionTime);
                    }
                }).catch(console.error);
            }

            const canvas = document.getElementById('certificateCanvas');
            const ctx = canvas.getContext('2d');

            const img = new Image();
            img.src = 'bangkhen.png'; // Đường dẫn đến file bằng khen

            img.onload = function() {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);

                // Vẽ tên lên bằng khen
                ctx.font = "bold 80px 'Fraunces', serif";
                ctx.fillStyle = "#000";
                ctx.textAlign = "left";
                
                // Tọa độ tên (điều chỉnh theo file bằng khen của bạn)
                const x = 730;
                const y = 585;
                
                ctx.fillText(name, x, y);

                // Tải xuống
                const link = document.createElement('a');
                link.download = `bangkhen_${name}_${currentRegion.name}.png`;
                link.href = canvas.toDataURL('image/png');
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                alert('Tải giấy chứng nhận thành công!');
                closeCertificateModal();
            };

            img.onerror = function() {
                alert('Không thể tải file bằng khen. Vui lòng kiểm tra file "bangkhen.png"!');
                closeCertificateModal();
            };
        }

        // Hàm load bảng xếp hạng
        async function loadRanking() {
            try {
                const rankingSnapshot = await db.collection('ranking')
                    .orderBy('score', 'desc')
                    .orderBy('completionTime', 'asc')
                    .limit(20)
                    .get();

                if (rankingSnapshot.empty) {
                    // Nếu chưa có dữ liệu, hiển thị bảng xếp hạng mẫu để đẹp
                    displaySampleRanking();
                    return;
                }

                const rankings = [];
                rankingSnapshot.forEach(doc => {
                    rankings.push(doc.data());
                });

                displayRanking(rankings);
            } catch (error) {
                console.error('Lỗi khi load bảng xếp hạng:', error);
                displaySampleRanking();
            }
        }

        // Thiết lập realtime update cho bảng xếp hạng
        function setupRealtimeRanking() {
            // Cleanup listeners cũ
            rankListeners.forEach(unsubscribe => {
                if (typeof unsubscribe === 'function') unsubscribe();
            });
            rankListeners = [];

            const unsubscribe = db.collection('ranking')
                .orderBy('score', 'desc')
                .orderBy('completionTime', 'asc')
                .limit(20)
                .onSnapshot((snapshot) => {
                    if (!snapshot.empty) {
                        const rankings = [];
                        snapshot.forEach(doc => {
                            rankings.push(doc.data());
                        });
                        displayRanking(rankings);
                    }
                }, (error) => {
                    console.error('Lỗi realtime ranking:', error);
                });

            rankListeners.push(unsubscribe);
        }

        function displaySampleRanking() {
            const rankingHtml = `
                <div class="ranking-container">
                    <div class="ranking-header">
                        <i class="fas fa-chart-simple"></i>
                        <h2>Bảng xếp hạng</h2>
                        <p>TOP NGƯỜI CHƠI XUẤT SẮC</p>
                    </div>

                    <div class="top3">
                        <div class="card top2-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">-/10</div>
                            <div class="rank-label">🥈 TOP 2</div>
                        </div>

                        <div class="card top1-card">
                            <i class="fas fa-crown crown-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">-/10</div>
                            <div class="rank-label">🥇 TOP 1</div>
                        </div>

                        <div class="card top3-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">-/10</div>
                            <div class="rank-label">🥉 TOP 3</div>
                        </div>
                    </div>

                    <div class="ranking-list">
                        <div class="row">
                            <div class="user">
                                <div class="user-info">
                                    <span class="user-name">Chưa có dữ liệu</span>
                                    <span class="user-badge"><i class="fas fa-info-circle"></i> Hãy là người đầu tiên!</span>
                                </div>
                            </div>
                            <div class="score-badge">0/10</div>
                        </div>
                    </div>
                </div>
            `;
            
            // Thêm vào cuối container
            const container = document.getElementById('mainContainer');
            container.innerHTML += rankingHtml;
        }

        function displayRanking(rankings) {
            if (!rankings || rankings.length === 0) {
                displaySampleRanking();
                return;
            }

            // Sắp xếp: điểm cao trước, nếu bằng điểm thì thời gian ngắn trước
            const sorted = [...rankings].sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                return a.completionTime - b.completionTime;
            });

            const top3 = sorted.slice(0, 3);
            const others = sorted.slice(3);

            // Format thời gian
            const formatTime = (seconds) => {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins}:${secs.toString().padStart(2, '0')}`;
            };

            // Tạo HTML cho top 3
            let top3Html = '';
            if (top3.length > 0) {
                const top1 = top3[0] || { userName: 'Chưa có', score: 0, completionTime: 0 };
                const top2 = top3[1] || { userName: 'Chưa có', score: 0, completionTime: 0 };
                const top3Item = top3[2] || { userName: 'Chưa có', score: 0, completionTime: 0 };

                top3Html = `
                    <div class="top3">
                        <div class="card top2-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">${top2.userName}</div>
                            <div class="score">${top2.score}/10</div>
                            <div class="rank-label">🥈 TOP 2</div>
                            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">${formatTime(top2.completionTime)}</div>
                        </div>

                        <div class="card top1-card">
                            <i class="fas fa-crown crown-icon"></i>
                            <div class="user-name">${top1.userName}</div>
                            <div class="score">${top1.score}/10</div>
                            <div class="rank-label">🥇 TOP 1</div>
                            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">${formatTime(top1.completionTime)}</div>
                        </div>

                        <div class="card top3-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">${top3Item.userName}</div>
                            <div class="score">${top3Item.score}/10</div>
                            <div class="rank-label">🥉 TOP 3</div>
                            <div style="font-size: 10px; color: rgba(255,255,255,0.7);">${formatTime(top3Item.completionTime)}</div>
                        </div>
                    </div>
                `;
            } else {
                top3Html = `
                    <div class="top3">
                        <div class="card top2-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">0/10</div>
                            <div class="rank-label">🥈 TOP 2</div>
                        </div>

                        <div class="card top1-card">
                            <i class="fas fa-crown crown-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">0/10</div>
                            <div class="rank-label">🥇 TOP 1</div>
                        </div>

                        <div class="card top3-card">
                            <i class="fas fa-trophy trophy-icon"></i>
                            <div class="user-name">Chưa có</div>
                            <div class="score">0/10</div>
                            <div class="rank-label">🥉 TOP 3</div>
                        </div>
                    </div>
                `;
            }

            // Tạo HTML cho danh sách còn lại
            const othersHtml = others.map((item, index) => {
                const rank = index + 4;
                let badge = '';
                if (rank <= 5) badge = '<i class="fas fa-fire"></i>';
                else if (rank <= 10) badge = '<i class="fas fa-leaf"></i>';
                else badge = '<i class="fas fa-star"></i>';

                return `
                    <div class="row">
                        <div class="user">
                            <div class="user-info">
                                <span class="user-name">${item.userName}</span>
                                <span class="user-badge">${badge} Hạng ${rank} • ${formatTime(item.completionTime)}</span>
                            </div>
                        </div>
                        <div class="score-badge"><i class="fas fa-star"></i> ${item.score}/10</div>
                    </div>
                `;
            }).join('');

            const rankingHtml = `
                <div class="ranking-container">
                    <div class="ranking-header">
                        <i class="fas fa-chart-simple"></i>
                        <h2>Bảng xếp hạng</h2>
                        <p>TOP NGƯỜI CHƠI XUẤT SẮC</p>
                    </div>

                    ${top3Html}

                    <div class="ranking-list">
                        ${othersHtml}
                        ${others.length === 0 ? '<div class="row"><div class="user"><div class="user-info"><span class="user-name">Chưa có thêm dữ liệu</span></div></div></div>' : ''}
                    </div>
                </div>
            `;

            // Thêm vào cuối container, nhưng tránh duplicate
            const container = document.getElementById('mainContainer');
            
            // Xóa ranking cũ nếu có
            const oldRanking = container.querySelector('.ranking-container');
            if (oldRanking) {
                oldRanking.remove();
            }
            
            container.innerHTML += rankingHtml;
        }

        // Thêm event listener để debug tọa độ
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.getElementById('certificateCanvas');
            if (canvas) {
                canvas.addEventListener('mousemove', function(e) {
                    const rect = canvas.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    console.log("x:", Math.floor(x), "y:", Math.floor(y));
                });
            }
        });
    </script>
</body>
